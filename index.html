<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Elite - Boteco 934</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a252f; color: #333; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #container { display: flex; width: 100%; padding: 10px; gap: 10px; box-sizing: border-box; }
        .painel { background: #ecf0f1; padding: 15px; border-radius: 8px; flex: 1; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { margin: 0 0 10px 0; border-bottom: 3px solid #27ae60; color: #2c3e50; font-size: 14px; text-transform: uppercase; }
        
        #mapa-mesas { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .mesa { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 11px; }
        .mesa-livre { background: #27ae60; }
        .mesa-ocupada { background: #e74c3c; }
        .mesa-selecionada { border: 4px solid #f1c40f !important; transform: scale(1.05); }

        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; text-transform: uppercase; }
        .carrinho-area { flex-grow: 1; background: #fff; border: 1px solid #ddd; margin: 10px 0; padding: 5px; overflow-y: auto; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #dcdde1; padding: 8px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        
        .total-destaque { font-size: 26px; font-weight: bold; background: #2c3e50; color: white; padding: 12px; text-align: center; border-radius: 4px; }
        .btn-acao { background: #27ae60; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; width: 100%; margin-top: 5px; }

        #modal-pagamento { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 20px; border-radius: 8px; width: 400px; text-align: center; }
        .metodo-btn { padding: 10px; margin: 3px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; width: 45%; color: white; }
    </style>
</head>
<body>

<div id="container">
    <div class="painel">
        <h2>📍 MAPA DE MESAS</h2>
        <div id="mapa-mesas"></div>
        <h2 id="titulo-mesa">🛒 SELECIONE UMA MESA</h2>
        <input type="text" id="busca-prod" placeholder="🔍 BUSCAR PRODUTO..." oninput="filtrarProdutos()">
        <select id="select-produtos" size="6" ondblclick="addCarrinho()"></select>
        
        <div style="display:flex; gap:5px;">
            <input type="text" id="novo-p-nome" placeholder="NOME NOVO PROD." style="font-size:10px;">
            <input type="number" id="novo-p-preco" placeholder="R$" style="width:70px; font-size:10px;">
            <button onclick="cadastrarProdutoRapido()" style="background:#3498db; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">+</button>
        </div>

        <div class="carrinho-area">
            <table id="tabela-itens">
                <thead><tr><th>QTD</th><th>ITEM</th><th>TOTAL</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="total-destaque" id="display-total">TOTAL: R$ 0,00</div>
    </div>

    <div class="painel" style="max-width: 350px;">
        <h2>👤 CLIENTE</h2>
        <input type="text" id="busca-cli" placeholder="🔍 BUSCAR CLIENTE..." oninput="filtrarClientes()">
        <select id="select-clientes" size="5" onchange="puxarWhats()"></select>
        
        <div style="display:flex; gap:5px;">
            <input type="text" id="novo-c-nome" placeholder="NOME NOVO CLIENTE" style="font-size:10px;">
            <button onclick="cadastrarClienteRapido()" style="background:#3498db; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">+</button>
        </div>

        <input type="text" id="whatsapp-cliente" placeholder="📱 WHATSAPP (DDD+NUM)">
        <div id="info-status" style="background:#d1d8e0; padding:10px; margin:10px 0; text-align:center; font-weight:bold;">BOTECO 934</div>
        <button class="btn-acao" style="background:#27ae60; font-size:18px;" onclick="abrirModal()">FECHAR CONTA</button>
    </div>
</div>

<div id="modal-pagamento">
    <div class="modal-content">
        <h2 id="cli-modal">CLIENTE</h2>
        <div id="falta-modal" style="font-size:32px; color:red; font-weight:bold;">R$ 0,00</div>
        <input type="number" id="valor-abate" placeholder="VALOR RECEBIDO" style="text-align:center; font-size:20px;">
        <div style="display:flex; flex-wrap:wrap; justify-content:center;">
            <button class="metodo-btn" style="background:#2ecc71" onclick="abater('DINHEIRO')">DINHEIRO</button>
            <button class="metodo-btn" style="background:#3498db" onclick="abater('PIX')">PIX</button>
            <button class="metodo-btn" style="background:#f1c40f; color:black;" onclick="abater('CARTÃO')">CARTÃO</button>
            <button class="metodo-btn" style="background:#e67e22" onclick="abater('PENDURA')">PENDURA</button>
        </div>
        <div id="lista-pagos" style="text-align:left; margin:10px 0; background:#f9f9f9; padding:5px;"></div>
        <button id="btn-whats-final" class="btn-acao" style="background:#25d366; display:none;" onclick="finalizarComZap()">ENVIAR WHATSAPP E FECHAR</button>
        <button onclick="fecharModal()" style="border:none; background:none; color:gray; cursor:pointer;">CANCELAR</button>
    </div>
</div>

<script>
    let produtos = [{nome:"CERVEJA LATA", preco:6.00}, {nome:"CERVEJA 600ML", preco:10.00}];
    let clientes = [{nome:"CONSUMIDOR", fone:""}];
    let mesas = {};
    for(let i=1; i<=12; i++) mesas[i] = {ativa:false, cliente:"", fone:"", itens:[], total:0, pagos:[], falta:0};
    let mesaAtual = null;

    function cadastrarProdutoRapido() {
        const n = document.getElementById('novo-p-nome').value.toUpperCase();
        const p = parseFloat(document.getElementById('novo-p-preco').value);
        if(!n || !p) return;
        produtos.push({nome:n, preco:p});
        document.getElementById('novo-p-nome').value=""; document.getElementById('novo-p-preco').value="";
        filtrarProdutos();
    }

    function cadastrarClienteRapido() {
        const n = document.getElementById('novo-c-nome').value.toUpperCase();
        if(!n) return;
        clientes.push({nome:n, fone:""});
        document.getElementById('novo-c-nome').value="";
        filtrarClientes();
    }

    function filtrarProdutos() {
        const b = document.getElementById('busca-prod').value.toUpperCase();
        const s = document.getElementById('select-produtos'); s.innerHTML = "";
        produtos.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(p => {
            if(p.nome.includes(b)) {
                let o = document.createElement('option'); o.text = `${p.nome} - R$ ${p.preco.toFixed(2)}`;
                o.value = p.preco; o.setAttribute('data-nome', p.nome); s.add(o);
            }
        });
    }

    function filtrarClientes() {
        const b = document.getElementById('busca-cli').value.toUpperCase();
        const s = document.getElementById('select-clientes'); s.innerHTML = "";
        clientes.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(c => {
            if(c.nome.includes(b)) {
                let o = document.createElement('option'); o.text = c.nome;
                o.value = c.nome; o.setAttribute('data-fone', c.fone); s.add(o);
            }
        });
    }

    function puxarWhats() {
        const s = document.getElementById('select-clientes');
        document.getElementById('whatsapp-cliente').value = s.options[s.selectedIndex].getAttribute('data-fone');
    }

    function gerarMesas() {
        const d = document.getElementById('mapa-mesas'); d.innerHTML = "";
        for(let i=1; i<=12; i++) {
            let b = document.createElement('button');
            b.className = `mesa ${mesas[i].ativa ? 'mesa-ocupada' : 'mesa-livre'} ${mesaAtual == i ? 'mesa-selecionada' : ''}`;
            b.innerText = `MESA ${i}`; b.onclick = () => selecionarMesa(i);
            d.appendChild(b);
        }
    }

    function selecionarMesa(id) {
        if(!mesas[id].ativa) {
            const c = document.getElementById('select-clientes').value;
            if(!c) return alert("Selecione o cliente!");
            mesas[id].ativa = true; mesas[id].cliente = c; 
            mesas[id].fone = document.getElementById('whatsapp-cliente').value;
        }
        mesaAtual = id;
        document.getElementById('titulo-mesa').innerText = `🛒 MESA ${id} - ${mesas[id].cliente}`;
        gerarMesas(); atualizarCarrinho();
    }

    function addCarrinho() {
        if(!mesaAtual) return;
        const s = document.getElementById('select-produtos');
        const n = s.options[s.selectedIndex].getAttribute('data-nome');
        const p = parseFloat(s.value);
        mesas[mesaAtual].itens.push({nome:n, preco:p});
        atualizarCarrinho();
    }

    function atualizarCarrinho() {
        const t = document.querySelector('#tabela-itens tbody'); t.innerHTML = "";
        let tot = 0;
        if(mesaAtual) {
            mesas[mesaAtual].itens.forEach(i => {
                tot += i.preco;
                t.innerHTML += `<tr><td>1x</td><td>${i.nome}</td><td>R$ ${i.preco.toFixed(2)}</td></tr>`;
            });
            mesas[mesaAtual].total = tot;
            mesas[mesaAtual].falta = tot - mesas[mesaAtual].pagos.reduce((a,b)=>a+b.valor,0);
        }
        document.getElementById('display-total').innerText = "TOTAL: R$ " + tot.toFixed(2);
    }

    function abrirModal() {
        if(!mesaAtual || mesas[mesaAtual].itens.length === 0) return;
        document.getElementById('modal-pagamento').style.display='flex';
        document.getElementById('cli-modal').innerText = mesas[mesaAtual].cliente;
        atualizarModal();
    }

    function fecharModal() { document.getElementById('modal-pagamento').style.display='none'; }

    function abater(tipo) {
        const v = parseFloat(document.getElementById('valor-abate').value);
        if(!v) return;
        let l = tipo === 'PENDURA' ? `PENDURA (${mesas[mesaAtual].cliente})` : tipo;
        mesas[mesaAtual].pagos.push({tipo:l, valor:v});
        mesas[mesaAtual].falta -= v;
        document.getElementById('valor-abate').value = "";
        atualizarModal();
    }

    function atualizarModal() {
        const m = mesas[mesaAtual];
        document.getElementById('falta-modal').innerText = "FALTA: R$ " + m.falta.toFixed(2);
        document.getElementById('lista-pagos').innerHTML = m.pagos.map(p => `<div>✅ ${p.tipo}: R$ ${p.valor.toFixed(2)}</div>`).join('');
        if(m.falta <= 0.01) document.getElementById('btn-whats-final').style.display='block';
    }

    function finalizarComZap() {
        const m = mesas[mesaAtual];
        const f = m.fone.replace(/\D/g,'');
        if(f) {
            let tx = `*BOTECO 934*%0AMESA ${mesaAtual} - ${m.cliente}%0A%0A`;
            m.itens.forEach(i => tx += `• ${i.nome}: R$ ${i.preco.toFixed(2)}%0A`);
            tx += `%0ATOTAL: R$ ${m.total.toFixed(2)}%0A`;
            m.pagos.forEach(p => tx += `✅ ${p.tipo}: R$ ${p.valor.toFixed(2)}%0A`);
            window.open(`https://api.whatsapp.com/send?phone=55${f}&text=${tx}`, '_blank');
        }
        mesas[mesaAtual] = {ativa:false, cliente:"", fone:"", itens:[], total:0, pagos:[], falta:0};
        mesaAtual = null; fecharModal(); gerarMesas(); atualizarCarrinho();
    }

    window.onload = () => { filtrarProdutos(); filtrarClientes(); gerarMesas(); };
</script>
</body>
</html>
