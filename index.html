<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Elite - Boteco 934</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a252f; color: #333; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #container { display: flex; width: 100%; padding: 10px; gap: 10px; box-sizing: border-box; }
        .painel { background: #ecf0f1; padding: 15px; border-radius: 8px; flex: 1; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { margin: 0 0 10px 0; border-bottom: 3px solid #27ae60; color: #2c3e50; font-size: 16px; text-transform: uppercase; }
        #mapa-mesas { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .mesa { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 11px; }
        .mesa-livre { background: #27ae60; }
        .mesa-ocupada { background: #e74c3c; }
        .mesa-selecionada { border: 4px solid #f1c40f !important; transform: scale(1.05); }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; text-transform: uppercase; }
        .carrinho-area { flex-grow: 1; background: #fff; border: 1px solid #ddd; margin: 10px 0; padding: 5px; overflow-y: auto; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #dcdde1; padding: 8px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        .total-destaque { font-size: 26px; font-weight: bold; background: #2c3e50; color: white; padding: 12px; text-align: center; border-radius: 4px; }
        .btn-abrir-fechamento { background: #27ae60; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; width: 100%; }
        .btn-excluir { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px; font-weight: bold; }

        /* MODAL DE FECHAMENTO */
        #modal-pagamento { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 20px; border-radius: 8px; width: 400px; text-align: center; }
        .valor-restante { font-size: 32px; color: #e74c3c; font-weight: bold; margin: 15px 0; }
        .metodo-btn { padding: 15px; margin: 5px; border-radius: 4px; border: 1px solid #ddd; cursor: pointer; font-weight: bold; width: 45%; }
    </style>
</head>
<body>

<div id="container">
    <div class="painel">
        <h2>📍 MAPA DE MESAS</h2>
        <div id="mapa-mesas"></div>
        <h2 id="titulo-mesa">🛒 SELECIONE UMA MESA</h2>
        <input type="text" id="busca-prod" placeholder="🔍 BUSCAR PRODUTO..." oninput="filtrarProdutos()">
        <select id="select-produtos" size="8" ondblclick="addCarrinho()"></select>
        <div class="carrinho-area">
            <table id="tabela-itens">
                <thead><tr><th>QTD</th><th>ITEM</th><th>TOTAL</th><th>❌</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="total-destaque" id="display-total">TOTAL: R$ 0,00</div>
    </div>

    <div class="painel" style="max-width: 380px;">
        <h2>👤 CLIENTE</h2>
        <input type="text" id="busca-cli" placeholder="🔍 BUSCAR CLIENTE..." oninput="filtrarClientes()">
        <select id="select-clientes" size="5"></select>
        <div id="info-status" style="background: #d1d8e0; padding: 10px; border-radius: 4px; margin: 10px 0; font-weight: bold; text-align: center;">AGUARDANDO...</div>
        <button class="btn-abrir-fechamento" onclick="abrirModal()">FECHAR CONTA / PAGAR</button>
    </div>
</div>

<div id="modal-pagamento">
    <div class="modal-content">
        <h2 style="color: #2c3e50;">DIVIDIR PAGAMENTO</h2>
        <div class="valor-restante" id="falta-modal">FALTA: R$ 0,00</div>
        
        <input type="number" id="valor-abatimento" placeholder="VALOR PARA ABATER (R$)" step="0.01">
        <div style="display: flex; flex-wrap: wrap; justify-content: center;">
            <button class="metodo-btn" style="background: #2ecc71; color:white;" onclick="registrarAbatimento('DINHEIRO')">💵 DINHEIRO</button>
            <button class="metodo-btn" style="background: #3498db; color:white;" onclick="registrarAbatimento('PIX')">📱 PIX</button>
            <button class="metodo-btn" style="background: #f1c40f; color:black;" onclick="registrarAbatimento('CARTÃO')">💳 CARTÃO</button>
            <button class="metodo-btn" style="background: #e67e22; color:white;" onclick="registrarAbatimento('FIADO')">📝 PENDURA</button>
        </div>
        <hr>
        <div id="lista-pagos" style="text-align: left; font-size: 12px; max-height: 100px; overflow-y: auto; margin-bottom: 10px;"></div>
        <button onclick="fecharModal()" style="background:#95a5a6; color:white; padding:10px; border:none; width:100%; cursor:pointer;">CANCELAR</button>
    </div>
</div>

<script>
    let produtos = [{ nome: "CERVEJA LATA", preco: 6.00 }, { nome: "CERVEJA 600ML", preco: 10.00 }, { nome: "REFRIGERANTE 2L", preco: 12.00 }, { nome: "AGUA S/ GAS", preco: 3.00 }];
    let clientes = [{ nome: "ADRIANO SILVA" }, { nome: "BRUNO OLIVEIRA" }, { nome: "MARIA SOUZA" }, { nome: "CONSUMIDOR" }];
    let mesas = {};
    for(let i=1; i<=12; i++) { mesas[i] = { aberta: false, cliente: "", itens: [], total: 0, pagos: [], falta: 0 }; }
    let mesaSelecionada = null;

    function iniciar() { gerarMesas(); filtrarProdutos(); filtrarClientes(); }

    function gerarMesas() {
        const div = document.getElementById('mapa-mesas');
        div.innerHTML = "";
        for(let i=1; i<=12; i++) {
            let btn = document.createElement('button');
            btn.className = `mesa ${mesas[i].aberta ? 'mesa-ocupada' : 'mesa-livre'} ${mesaSelecionada == i ? 'mesa-selecionada' : ''}`;
            btn.innerText = `MESA ${i.toString().padStart(2, '0')}`;
            btn.onclick = () => selecionarMesa(i);
            div.appendChild(btn);
        }
    }

    function selecionarMesa(id) {
        if (!mesas[id].aberta) {
            const cli = document.getElementById('select-clientes').value;
            if (!cli) { alert("⚠️ SELECIONE O CLIENTE PRIMEIRO!"); return; }
            mesas[id].aberta = true; mesas[id].cliente = cli;
        }
        mesaSelecionada = id;
        document.getElementById('titulo-mesa').innerText = `🛒 MESA ${id} - ${mesas[id].cliente}`;
        document.getElementById('info-status').innerText = `MESA ${id} ATIVA`;
        gerarMesas(); atualizarTelaCarrinho();
    }

    function addCarrinho() {
        if (!mesaSelecionada) return;
        const s = document.getElementById('select-produtos');
        const nome = s.options[s.selectedIndex].getAttribute('data-nome');
        const preco = parseFloat(s.value);
        let m = mesas[mesaSelecionada];
        let item = m.itens.find(i => i.nome === nome);
        if (item) item.qtd++; else m.itens.push({ nome, preco, qtd: 1 });
        atualizarTelaCarrinho();
    }

    function atualizarTelaCarrinho() {
        const corpo = document.querySelector('#tabela-itens tbody');
        corpo.innerHTML = ""; let total = 0;
        if(mesaSelecionada) {
            mesas[mesaSelecionada].itens.forEach((i, idx) => {
                let sub = i.preco * i.qtd; total += sub;
                corpo.innerHTML += `<tr><td>${i.qtd}x</td><td>${i.nome}</td><td>R$ ${sub.toFixed(2)}</td><td><button class="btn-excluir" onclick="removerItem(${idx})">❌</button></td></tr>`;
            });
            mesas[mesaSelecionada].total = total;
            if (!mesas[mesaSelecionada].pagos.length) mesas[mesaSelecionada].falta = total;
        }
        document.getElementById('display-total').innerText = "TOTAL: R$ " + total.toFixed(2);
    }

    function abrirModal() {
        if (!mesaSelecionada || mesas[mesaSelecionada].itens.length === 0) return;
        document.getElementById('modal-pagamento').style.display = 'flex';
        atualizarModal();
    }

    function fecharModal() { document.getElementById('modal-pagamento').style.display = 'none'; }

    function atualizarModal() {
        let m = mesas[mesaSelecionada];
        document.getElementById('falta-modal').innerText = "FALTA: R$ " + m.falta.toFixed(2);
        document.getElementById('lista-pagos').innerHTML = m.pagos.map(p => `<div>✅ ${p.tipo}: R$ ${p.valor.toFixed(2)}</div>`).join('');
        if (m.falta <= 0.01) finalizarVenda();
    }

    function registrarAbatimento(tipo) {
        let v = parseFloat(document.getElementById('valor-abatimento').value);
        if (!v || v <= 0) return;
        let m = mesas[mesaSelecionada];
        m.pagos.push({ tipo, valor: v });
        m.falta -= v;
        document.getElementById('valor-abatimento').value = "";
        atualizarModal();
    }

    function finalizarVenda() {
        let m = mesas[mesaSelecionada];
        const win = window.open('', '', 'width=350,height=600');
        let itensTxt = m.itens.map(i => `<tr><td>${i.qtd}x</td><td>${i.nome}</td><td align="right">R$ ${(i.qtd*i.preco).toFixed(2)}</td></tr>`).join('');
        let pagosTxt = m.pagos.map(p => `${p.tipo}: R$ ${p.valor.toFixed(2)}<br>`).join('');

        win.document.write(`<html><body style="font-family:monospace;width:280px;padding:10px;"><center><strong>BOTECO 934</strong><br>RECIBO MESA ${mesaSelecionada}<br>${new Date().toLocaleString()}<br>---</center><table width="100%">${itensTxt}</table>---<br>TOTAL: R$ ${m.total.toFixed(2)}<br><div style="font-size:11px;">${pagosTxt}</div><br><center>CLIENTE: ${m.cliente}</center></body></html>`);
        win.document.close(); win.print(); win.close();
        
        mesas[mesaSelecionada] = { aberta: false, cliente: "", itens: [], total: 0, pagos: [], falta: 0 };
        mesaSelecionada = null;
        fecharModal(); gerarMesas(); atualizarTelaCarrinho();
    }

    function filtrarProdutos() {
        const b = document.getElementById('busca-prod').value.toUpperCase();
        const s = document.getElementById('select-produtos'); s.innerHTML = "";
        produtos.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(p => {
            if(p.nome.includes(b)) {
                let o = document.createElement('option'); o.text = `${p.nome} - R$ ${p.preco.toFixed(2)}`; o.value = p.preco; o.setAttribute('data-nome', p.nome); s.add(o);
            }
        });
    }

    function filtrarClientes() {
        const b = document.getElementById('busca-cli').value.toUpperCase();
        const s = document.getElementById('select-clientes'); s.innerHTML = "";
        clientes.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(c => {
            if(c.nome.includes(b)) {
                let o = document.createElement('option'); o.text = c.nome; o.value = c.nome; s.add(o);
            }
        });
    }
    window.onload = iniciar;
</script>
</body>
</html>
