<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PDV Elite - Boteco 934</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 1200px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .col { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        h2 { border-bottom: 2px solid #27ae60; padding-bottom: 5px; color: #333; font-size: 22px; display: flex; align-items: center; gap: 10px; }

        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        /* Ajuste das Listas (Mercadorias e Clientes) */
        .lista-box { height: 180px; overflow-y: auto; text-transform: uppercase; font-weight: bold; }

        /* Grade de Pagamentos */
        .grid-pagamentos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #fdfdfd; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        .campo-pg { display: flex; flex-direction: column; gap: 5px; }
        .campo-pg label { font-weight: bold; font-size: 14px; color: #444; }

        /* Destaque do Total */
        .total-container { background: #e8f5e9; padding: 20px; border-radius: 8px; text-align: center; margin-top: auto; }
        .total-valor { font-size: 35px; color: #27ae60; font-weight: bold; }

        .btn-fechar { background: #27ae60; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-fechar:hover { background: #219150; }
    </style>
</head>
<body>

<div class="container">
    <div class="col">
        <h2>📦 Mercadorias</h2>
        <input type="text" placeholder="BUSCAR PRODUTO...">
        <select size="8" class="lista-box">
            <option>AGUA MINERAL - R$ 3.50</option>
            <option>CERVEJA LATA - R$ 6.50</option>
            <option>COCA-COLA 2L - R$ 12.00</option>
            <option>PETISCO MISTO - R$ 25.00</option>
        </select>

        <h2>🛒 Itens da Venda</h2>
        <div class="total-container">
            <span>Total:</span>
            <div class="total-valor">R$ <span id="valor-total">47.00</span></div>
        </div>
    </div>

    <div class="col">
        <h2>👤 Cliente & Cobrança</h2>
        <input type="text" placeholder="BUSCAR CLIENTE...">
        <select id="select-clientes" size="4" class="lista-box" style="height: 100px;">
            <option value="ADRIANO SANTOS">ADRIANO SANTOS</option>
            <option value="EDMARQUES">EDMARQUES</option>
        </select>
        
        <p><strong>Contato:</strong> <span id="contato-cliente">---</span></p>

        <div class="grid-pagamentos">
            <div class="campo-pg">
                <label>💵 Dinheiro:</label>
                <input type="number" step="0.01" class="input-pg" placeholder="0.00" oninput="calcularRestante()">
            </div>
            <div class="campo-pg">
                <label>💳 Cartão Crédito:</label>
                <input type="number" step="0.01" class="input-pg" placeholder="0.00" oninput="calcularRestante()">
            </div>
            <div class="campo-pg">
                <label>💳 Cartão Débito:</label>
                <input type="number" step="0.01" class="input-pg" placeholder="0.00" oninput="calcularRestante()">
            </div>
            <div class="campo-pg">
                <label>📲 PIX:</label>
                <input type="number" step="0.01" class="input-pg" placeholder="0.00" oninput="calcularRestante()">
            </div>
            <div class="campo-pg" style="grid-column: span 2;">
                <label>📝 FIADO (Pendura):</label>
                <input type="number" id="v-fiado" step="0.01" class="input-pg" placeholder="0.00" style="border: 1px solid red;" oninput="calcularRestante()">
            </div>
        </div>

        <div id="aviso-restante" style="text-align: center; font-weight: bold; color: red; margin-top: 10px;">
            FALTA: R$ <span id="valor-restante">47.00</span>
        </div>

        <button class="btn-fechar" onclick="finalizar()">Finalizar Conta</button>
    </div>
</div>

<script>
    const totalVenda = 47.00;

    function calcularRestante() {
        const inputs = document.querySelectorAll('.input-pg');
        let pago = 0;
        inputs.forEach(i => pago += parseFloat(i.value) || 0);
        
        const restante = totalVenda - pago;
        const display = document.getElementById('valor-restante');
        const aviso = document.getElementById('aviso-restante');

        if (restante <= 0) {
            display.innerText = Math.abs(restante).toFixed(2);
            aviso.style.color = "green";
            aviso.innerHTML = "PAGO / TROCO: R$ " + Math.abs(restante).toFixed(2);
        } else {
            display.innerText = restante.toFixed(2);
            aviso.style.color = "red";
            aviso.innerHTML = "FALTA: R$ " + restante.toFixed(2);
        }
    }

    function finalizar() {
        const fiado = parseFloat(document.getElementById('v-fiado').value) || 0;
        const cliente = document.getElementById('select-clientes').value;

        if (fiado > 0 && !cliente) {
            alert("Selecione um cliente para a venda no FIADO!");
            return;
        }
        alert("Venda finalizada com sucesso!");
    }
</script>

</body>
</html>
