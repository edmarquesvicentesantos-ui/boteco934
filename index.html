<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ELITE V14 - BOTECO 934 (VISUAL)</title>
    <style>
        :root { --dark: #1a252f; --sidebar: #2c3e50; --accent: #f39c12; --success: #27ae60; --danger: #e74c3c; --info: #2980b9; --bg: #dfe6e9; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; font-size: 13px; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        nav { width: 200px; background: var(--dark); color: white; display: flex; flex-direction: column; border-right: 2px solid var(--accent); }
        .nav-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #34495e; font-weight: bold; }
        .nav-item.active { background: var(--sidebar); color: var(--accent); border-left: 4px solid var(--accent); }

        main { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .painel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 100%; margin-bottom: 5px; }
        .btn-acao { padding: 10px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }
        
        .mesa-btn { flex: 1; padding: 15px 5px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; min-width: 90px; }
        .campo-bipe { background: #fff9c4 !important; border: 2px solid var(--accent) !important; font-size: 18px !important; font-weight: bold; text-align: center; }
        
        /* ESTILO DAS FOTOS */
        .foto-item { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; border: 1px solid #ddd; margin-right: 10px; }
        .card-produto { border: 1px solid #eee; padding: 10px; border-radius: 8px; text-align: center; background: #fff; }
        .img-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-bottom: 5px; }
        .caixa-bloqueado { filter: grayscale(1); pointer-events: none; opacity: 0.4; }
    </style>
</head>
<body>

<nav>
    <div style="padding:20px; color:var(--accent); font-weight:bold; text-align:center; font-size:18px;">BOTECO 934</div>
    <div class="nav-item active" onclick="ver('aba-vendas')">🛒 VENDAS</div>
    <div class="nav-item" onclick="ver('aba-produtos')">📦 PRODUTOS + FOTO</div>
    <div class="nav-item" onclick="ver('aba-clientes')">👥 CLIENTES</div>
    <button onclick="abrirCaixa()" style="background:var(--success); color:white; border:none; padding:12px; cursor:pointer; font-weight:bold; margin:15px; border-radius:4px;">🔓 ABRIR CAIXA</button>
</nav>

<main>
    <div id="aba-vendas" class="tab-content">
        <div id="aviso-caixa" style="background:var(--danger); color:white; padding:10px; text-align:center; font-weight:bold; border-radius:4px; margin-bottom:10px;">🚨 CAIXA FECHADO!</div>
        
        <div id="area-trabalho" class="caixa-bloqueado">
            <div id="grid-mesas" style="display:flex; gap:10px; margin-bottom:15px; flex-wrap: wrap;"></div>
            
            <div style="display:flex; gap:15px;">
                <div class="painel" style="flex:1.2;">
                    <h2 id="titulo-mesa">🛒 MESA...</h2>
                    <input type="text" id="campo-bipe" class="campo-bipe" placeholder="BIPE O PRODUTO..." onkeypress="processarBipe(event)">
                    
                    <div id="cupom-lista" style="margin-top:20px; border-top: 2px solid #eee; padding-top:10px;">
                        </div>
                </div>

                <div class="painel" style="flex:0.8; border:2px solid #333; background:#f9f9f9;">
                    <h3 id="cupom-nome" style="text-align:center; margin-bottom:15px;">FECHAMENTO</h3>
                    <div id="resumo-total" style="font-size:26px; font-weight:bold; text-align:center; padding:15px; background:var(--dark); color:var(--accent); border-radius:8px;">
                        R$ 0,00
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top:15px;">
                        <button class="btn-acao" style="background:var(--success);" onclick="finalizar('DINHEIRO')">DINHEIRO</button>
                        <button class="btn-acao" style="background:var(--info);" onclick="finalizar('PIX')">PIX</button>
                        <button class="btn-acao" style="background:#8e44ad;" onclick="finalizar('CARTÃO')">CARTÃO</button>
                        <button class="btn-acao" style="background:var(--danger);" onclick="finalizar('PENDURA')">PENDURA</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="aba-produtos" class="tab-content" style="display:none">
        <div class="painel">
            <h2>📦 CADASTRO COM IMAGEM</h2>
            <div style="display:grid; grid-template-columns: 1fr 2fr 1.5fr 1fr 1fr; gap:10px; align-items:end;">
                <div><label>EAN</label><input type="text" id="p-ean"></div>
                <div><label>Nome</label><input type="text" id="p-nome"></div>
                <div><label>Link da Foto (URL)</label><input type="text" id="p-foto" placeholder="http://..."></div>
                <div><label>Venda</label><input type="number" id="p-venda"></div>
                <button class="btn-acao" style="background:var(--success);" onclick="salvarProduto()">SALVAR</button>
            </div>
        </div>
        <div id="vitrine-produtos" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:15px;">
            </div>
    </div>
</main>

<script>
    let estoque = [
        {ean: "7891991000858", n: "Heineken 600ml", v: 14.00, img: "https://images.tcdn.com.br/img/img_prod/704122/cerveja_heineken_garrafa_600ml_875_1_20200508123232.jpg"},
        {ean: "7891149200500", n: "Coca-Cola 2L", v: 11.00, img: "https://static.paodeacucar.com/img/uploads/1/565/20120565.jpg"}
    ];
    let mesas = {};
    for(let i=1; i<=10; i++) mesas[i] = { ativa: false, cliente: "", total: 0, itens: [] };
    let mesaSel = null;

    function abrirCaixa() {
        if(prompt("Valor Inicial:")) {
            document.getElementById('aviso-caixa').style.display = 'none';
            document.getElementById('area-trabalho').classList.remove('caixa-bloqueado');
        }
    }

    function processarBipe(e) {
        if(e.key === 'Enter') {
            if(!mesaSel) return alert("Selecione a mesa!");
            let cod = document.getElementById('campo-bipe').value;
            let p = estoque.find(i => i.ean === cod);
            if(p) {
                mesas[mesaSel].itens.push({...p});
                mesas[mesaSel].total += p.v;
                renderCupom();
            } else {
                alert("Produto não cadastrado!");
            }
            document.getElementById('campo-bipe').value = "";
        }
    }

    function renderCupom() {
        if(!mesaSel) return;
        let m = mesas[mesaSel];
        document.getElementById('titulo-mesa').innerText = `MESA ${mesaSel} - ${m.cliente}`;
        document.getElementById('cupom-lista').innerHTML = m.itens.map(i => `
            <div style="display:flex; align-items:center; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                <img src="${i.img || 'https://via.placeholder.com/40'}" class="foto-item">
                <div style="flex:1"><b>${i.n}</b></div>
                <div><b>R$ ${i.v.toFixed(2)}</b></div>
            </div>
        `).join('');
        document.getElementById('resumo-total').innerText = "R$ " + m.total.toFixed(2);
    }

    function salvarProduto() {
        let ean = document.getElementById('p-ean').value;
        let nome = document.getElementById('p-nome').value;
        let foto = document.getElementById('p-foto').value;
        let venda = parseFloat(document.getElementById('p-venda').value);
        if(nome && venda) {
            estoque.push({ean, n: nome, v: venda, img: foto});
            atualizarVitrine();
            alert("Cadastrado!");
        }
    }

    function atualizarVitrine() {
        document.getElementById('vitrine-produtos').innerHTML = estoque.map(p => `
            <div class="card-produto">
                <img src="${p.img || 'https://via.placeholder.com/80'}" class="img-preview"><br>
                <b>${p.n}</b><br>
                <span style="color:var(--success)">R$ ${p.v.toFixed(2)}</span>
            </div>
        `).join('');
    }

    function renderMesas() {
        const grid = document.getElementById('grid-mesas');
        grid.innerHTML = "";
        for(let i=1; i<=10; i++) {
            let b = document.createElement('button');
            b.className = "mesa-btn";
            b.style.background = mesas[i].ativa ? 'var(--danger)' : 'var(--success)';
            if(mesaSel == i) b.style.boxShadow = "0 0 0 4px var(--accent)";
            b.innerHTML = `MESA ${i}<br>${mesas[i].ativa ? mesas[i].cliente : 'LIVRE'}`;
            b.onclick = () => {
                if(!mesas[i].ativa) {
                    let n = prompt("Nome do Cliente:");
                    if(!n) return;
                    mesas[i].ativa = true; mesas[i].cliente = n;
                }
                mesaSel = i; renderMesas(); renderCupom();
                document.getElementById('campo-bipe').focus();
            };
            grid.appendChild(b);
        }
    }

    function finalizar(tipo) {
        if(!mesaSel) return;
        alert(`BOTECO 934\nCliente: ${mesas[mesaSel].cliente}\nTotal: R$ ${mesas[mesaSel].total.toFixed(2)}\nPagamento: ${tipo}`);
        mesas[mesaSel] = { ativa: false, cliente: "", total: 0, itens: [] };
        mesaSel = null; renderMesas(); renderCupom();
    }

    function ver(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(event) event.currentTarget.classList.add('active');
    }

    window.onload = () => { renderMesas(); atualizarVitrine(); };
</script>
</body>
</html>
