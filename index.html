<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ELITE V24 - BOTECO 934</title>
    <style>
        :root { 
            --dark: #1a252f; --sidebar: #2c3e50; --accent: #f39c12; 
            --success: #27ae60; --danger: #c0392b; --info: #2980b9; 
            --bg: #f1f2f6;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        aside { width: 250px; background: var(--dark); color: white; display: flex; flex-direction: column; flex-shrink: 0; border-right: 5px solid var(--accent); }
        .header-loja { padding: 25px; text-align: center; font-size: 20px; font-weight: bold; color: var(--accent); border-bottom: 2px solid var(--sidebar); }
        .menu-btn { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #34495e; font-weight: bold; transition: 0.3s; }
        .menu-btn.active { background: var(--sidebar); color: var(--accent); border-left: 8px solid var(--accent); }

        main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .conteudo { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .painel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }

        .grid-calc { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; }
        
        .res-card { background: #1e272e; color: white; padding: 20px; border-radius: 10px; height: 100%; border-left: 8px solid var(--accent); }
        .linha-res { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #3d4e5f; font-weight: bold; }
        .secao-titulo { color: var(--accent); margin-top: 15px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .destaque-valor { color: #2ecc71; font-size: 1.4em; }
        .btn-tipo { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 15px; width: 48%; }
    </style>
</head>
<body>

<aside>
    <div class="header-loja">BOTECO 934</div>
    <div class="menu-btn active">🧠 MIX & DOSES</div>
    <div class="menu-btn" onclick="ver('aba-vendas', this)">🛒 VENDAS</div>
    <div class="menu-btn" onclick="ver('aba-produtos', this)">📦 ESTOQUE</div>
    <div style="margin-top: auto; padding: 20px; text-align: center; color: #7f8c8d; font-size: 12px;">
        Elite V24 - Boteco 934
    </div>
</aside>

<main>
    <div class="conteudo">
        <div class="painel">
            <h2 style="margin-top:0;">📊 CALCULADORA PROFISSIONAL DE LUCRO</h2>
            
            <div style="margin-bottom: 20px;">
                <button id="btn-grade" class="btn-tipo" style="background:var(--info); color:white;" onclick="mudarModo('grade')">GRADE / FARDO / VINHO</button>
                <button id="btn-dose" class="btn-tipo" style="background:#ecf0f1; color:var(--dark);" onclick="mudarModo('dose')">DOSES (DESTILADOS)</button>
            </div>

            <div class="grid-calc">
                <div>
                    <label id="lbl-custo"><b>Custo da Compra (R$):</b></label>
                    <input type="number" id="c-total" placeholder="0.00" oninput="calcular()">
                    
                    <label id="lbl-qtd"><b>Qtd de Itens na Grade:</b></label>
                    <input type="number" id="c-qtd" placeholder="Ex: 12 ou 24" oninput="calcular()">

                    <div id="campos-dose" style="display:none;">
                        <label><b>Tamanho da Dose (ml):</b></label>
                        <select id="dose-ml" onchange="calcular()">
                            <option value="50">50 ml (Padrão)</option>
                            <option value="60">60 ml (Generosa)</option>
                            <option value="70">70 ml (Dose Dupla/Especial)</option>
                        </select>
                    </div>

                    <label><b>Preço de Venda Unitário/Dose (R$):</b></label>
                    <input type="number" id="v-venda" placeholder="Por quanto vai vender?" oninput="calcular()">

                    <label id="lbl-extra"><b>Custo de Gelo/Energia (Opcional):</b></label>
                    <input type="number" id="c-extra" placeholder="0.00" value="0" oninput="calcular()">
                </div>

                <div class="res-card">
                    <h3 style="text-align:center; margin-top:0; border-bottom: 2px solid var(--accent); padding-bottom: 10px;">ANÁLISE ELITE</h3>
                    
                    <div class="secao-titulo">CUSTO REAL</div>
                    <div class="linha-res"><span id="txt-custo-unid">Custo p/ Unidade:</span> <span id="res-custo">R$ 0,00</span></div>
                    
                    <div class="secao-titulo">LUCRO NO BOLSO</div>
                    <div class="linha-res"><span>Lucro por Venda:</span> <span id="res-lucro" class="destaque-valor">R$ 0,00</span></div>
                    <div class="linha-res"><span id="txt-lucro-total">Lucro p/ Grade:</span> <span id="res-total">R$ 0,00</span></div>
                    
                    <div class="secao-titulo">DESEMPENHO</div>
                    <div class="linha-res"><span>Margem de Lucro:</span> <span id="res-margem">0%</span></div>
                    <div id="box-rendimento" class="linha-res" style="display:none; color:var(--accent);">
                        <span>Doses por Garrafa:</span> <span id="res-rend">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    let modoAtual = 'grade';

    function mudarModo(modo) {
        modoAtual = modo;
        const btnGrade = document.getElementById('btn-grade');
        const btnDose = document.getElementById('btn-dose');
        const camposDose = document.getElementById('campos-dose');
        const boxRend = document.getElementById('box-rendimento');
        
        // Labels
        const lblCusto = document.getElementById('lbl-custo');
        const lblQtd = document.getElementById('lbl-qtd');
        const txtCustoUnid = document.getElementById('txt-custo-unid');
        const txtLucroTotal = document.getElementById('txt-lucro-total');

        if(modo === 'dose') {
            btnDose.style.background = "var(--info)"; btnDose.style.color = "white";
            btnGrade.style.background = "#ecf0f1"; btnGrade.style.color = "var(--dark)";
            camposDose.style.display = "block";
            boxRend.style.display = "flex";
            
            lblCusto.innerHTML = "<b>Custo da Garrafa (R$):</b>";
            lblQtd.innerHTML = "<b>ML da Garrafa (Total):</b>";
            document.getElementById('c-qtd').placeholder = "Ex: 750 ou 1000";
            txtCustoUnid.innerText = "Custo p/ Dose:";
            txtLucroTotal.innerText = "Lucro Total Garrafa:";
        } else {
            btnGrade.style.background = "var(--info)"; btnGrade.style.color = "white";
            btnDose.style.background = "#ecf0f1"; btnDose.style.color = "var(--dark)";
            camposDose.style.display = "none";
            boxRend.style.display = "none";
            
            lblCusto.innerHTML = "<b>Custo da Compra (R$):</b>";
            lblQtd.innerHTML = "<b>Qtd de Itens na Grade:</b>";
            document.getElementById('c-qtd').placeholder = "Ex: 12 ou 24";
            txtCustoUnid.innerText = "Custo p/ Unidade:";
            txtLucroTotal.innerText = "Lucro p/ Grade:";
        }
        calcular();
    }

    function calcular() {
        const custoTotal = parseFloat(document.getElementById('c-total').value) || 0;
        const qtdOuML = parseFloat(document.getElementById('c-qtd').value) || 1;
        const precoVenda = parseFloat(document.getElementById('v-venda').value) || 0;
        const extra = parseFloat(document.getElementById('c-extra').value) || 0;

        let custoIndividual = 0;
        let rendimento = 0;

        if(modoAtual === 'dose') {
            const doseML = parseFloat(document.getElementById('dose-ml').value);
            const custoPorML = custoTotal / qtdOuML;
            custoIndividual = (custoPorML * doseML) + (extra / (qtdOuML / doseML));
            rendimento = Math.floor(qtdOuML / doseML);
            document.getElementById('res-rend').innerText = rendimento + " doses";
        } else {
            custoIndividual = (custoTotal / qtdOuML) + (extra / qtdOuML);
        }

        const lucroUnitario = precoVenda - custoIndividual;
        const lucroTotal = modoAtual === 'dose' ? lucroUnitario * rendimento : lucroUnitario * qtdOuML;
        const margem = (lucroUnitario / (precoVenda || 1)) * 100;

        document.getElementById('res-custo').innerText = "R$ " + custoIndividual.toFixed(2);
        document.getElementById('res-lucro').innerText = "R$ " + lucroUnitario.toFixed(2);
        document.getElementById('res-total').innerText = "R$ " + lucroTotal.toFixed(2);
        document.getElementById('res-margem').innerText = isFinite(margem) ? margem.toFixed(1) + "%" : "0%";
    }
</script>
</body>
</html>
