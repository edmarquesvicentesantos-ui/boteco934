<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - VERSÃO FORÇADA</title>
    <style>
        :root { --primary: #1a252f; --success: #27ae60; --accent: #f1c40f; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--accent); }
        .nav-bar { background: #2c3e50; display: flex; justify-content: space-around; }
        .nav-btn { color: white; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: #1abc9c; }
        
        /* AQUI ESTÁ O QUE FALTAVA NO SEU PRINT */
        main { flex: 1; display: flex !important; flex-direction: row; overflow: hidden; }
        .coluna { height: 100%; border-right: 2px solid #ddd; overflow-y: auto; padding: 10px; }
        
        #col-mesas { width: 140px; background: #fff; }
        #col-prods { flex: 1; background: #fff; }
        #col-car   { width: 300px; background: #ecf0f1; }

        .mesa { padding: 15px; margin-bottom: 10px; border: 2px solid #ccc; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; }
        .mesa.selecionada { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .card { border: 1px solid #ddd; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; background: white; }
        .btn-venda { background: var(--success); color: white; padding: 15px; border: none; width: 100%; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header><strong>BOTECO 934 - GESTÃO ATIVA</strong></header>

<nav class="nav-bar">
    <button class="nav-btn active">🛒 VENDAS</button>
    <button class="nav-btn">📦 ESTOQUE</button>
    <button class="nav-btn">💰 CAIXA</button>
</nav>

<main>
    <div class="coluna" id="col-mesas">
        <h3>MESAS</h3>
        <div id="lista-mesas"></div>
    </div>

    <div class="coluna" id="col-prods">
        <div style="margin-bottom: 15px;">
            <label>Cliente:</label>
            <select id="sel-cli" style="padding: 5px;"><option>Balcão</option></select>
        </div>
        <div id="grid-prods" class="grid"></div>
    </div>

    <div class="coluna" id="col-car">
        <h3 id="titulo-mesa">Selecione uma mesa</h3>
        <div id="itens-car" style="min-height: 200px; border: 1px dashed #999; margin-bottom: 10px; padding: 10px;"></div>
        <div style="font-size: 20px; font-weight: bold; margin-bottom: 10px;">Total: R$ <span id="total-val">0.00</span></div>
        <button class="btn-venda" onclick="fechar()">FECHAR CONTA</button>
    </div>
</main>

<script>
    // DADOS FIXOS PARA O TESTE NÃO FALHAR
    let estoque = [
        {ean: "1", nome: "Heineken LN", preco: 16.00},
        {ean: "2", nome: "Skol Lata", preco: 6.50},
        {ean: "3", nome: "Dose Old Parr", preco: 18.00}
    ];
    let mesas = Array.from({length: 8}, (_, i) => ({id: i+1, total: 0, itens: []}));
    let mesaAtual = null;

    function render() {
        // Renderizar Mesas
        document.getElementById('lista-mesas').innerHTML = mesas.map(m => `
            <div class="mesa ${mesaAtual === m.id ? 'selecionada' : ''}" onclick="sel(${m.id})">
                MESA ${m.id}<br><small>R$ ${m.total.toFixed(2)}</small>
            </div>
        `).join('');

        // Renderizar Produtos
        document.getElementById('grid-prods').innerHTML = estoque.map(p => `
            <div class="card" onclick="add('${p.ean}')">
                <b>${p.nome}</b><br>R$ ${p.preco.toFixed(2)}
            </div>
        `).join('');
    }

    function sel(id) {
        mesaAtual = id;
        document.getElementById('titulo-mesa').innerText = "CONTA MESA " + id;
        render();
        attConta();
    }

    function add(ean) {
        if(!mesaAtual) return alert("Selecione a mesa primeiro!");
        let p = estoque.find(x => x.ean === ean);
        let m = mesas.find(x => x.id === mesaAtual);
        m.itens.push(p);
        m.total += p.preco;
        attConta();
        render();
    }

    function attConta() {
        let m = mesas.find(x => x.id === mesaAtual);
        document.getElementById('itens-car').innerHTML = m.itens.map(i => `• ${i.nome} (R$ ${i.preco.toFixed(2)})<br>`).join('');
        document.getElementById('total-val').innerText = m.total.toFixed(2);
    }

    function fechar() {
        alert("Venda finalizada!");
        let m = mesas.find(x => x.id === mesaAtual);
        m.itens = []; m.total = 0;
        mesaAtual = null;
        document.getElementById('titulo-mesa').innerText = "Selecione uma mesa";
        render();
        attConta();
    }

    // Iniciar
    render();
</script>
</body>
</html>
