<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDV Elite - Boteco 934</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: system-ui, -apple-system, sans-serif; }
        .sidebar { width: 260px; background: #0f172a; color: white; height: 100vh; position: fixed; z-index: 50; transition: 0.3s; }
        .main-content { margin-left: 260px; width: calc(100% - 260px); min-height: 100vh; }
        .section { display: none; }
        .section.active { display: block; animation: slideUp 0.3s ease; }
        .cupom { background: #fff; border: 2px dashed #cbd5e1; font-family: 'Courier New', monospace; border-radius: 4px; }
        .mesa-card { transition: 0.2s; cursor: pointer; border-radius: 16px; border: 1px solid #e2e8f0; }
        .mesa-ocupada { border-top: 8px solid #f97316; background: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .menu-text { display: none; }
            .main-content { margin-left: 70px; width: calc(100% - 70px); }
        }
    </style>
</head>
<body>

    <div class="sidebar p-4 shadow-2xl">
        <div class="mb-10 text-center">
            <h2 class="text-xl font-black text-orange-500 menu-text">BOTECO 934</h2>
            <div class="h-1 w-12 bg-orange-500 mx-auto mt-1 rounded-full menu-text"></div>
        </div>
        <nav class="space-y-4">
            <button onclick="mudar('mesas')" class="w-full p-4 rounded-xl hover:bg-slate-800 flex items-center transition-all">
                <span class="text-xl text-orange-400">🪑</span><span class="ml-4 menu-text font-semibold">Mesas</span>
            </button>
            <button onclick="mudar('fiado')" class="w-full p-4 rounded-xl hover:bg-slate-800 flex items-center transition-all">
                <span class="text-xl text-red-400">📝</span><span class="ml-4 menu-text font-semibold">Fiado</span>
            </button>
            <button onclick="mudar('cadastros')" class="w-full p-4 rounded-xl hover:bg-slate-800 flex items-center transition-all border border-slate-700">
                <span class="text-xl">➕</span><span class="ml-4 menu-text font-semibold text-yellow-400">Cadastros</span>
            </button>
            <button onclick="mudar('calc')" class="w-full p-4 rounded-xl hover:bg-slate-800 flex items-center transition-all">
                <span class="text-xl text-green-400">🧮</span><span class="ml-4 menu-text font-semibold">Calculadora</span>
            </button>
            <button onclick="mudar('relatorio')" class="w-full p-4 rounded-xl hover:bg-slate-800 flex items-center transition-all">
                <span class="text-xl text-blue-400">📊</span><span class="ml-4 menu-text font-semibold">Caixa</span>
            </button>
        </nav>
    </div>

    <main class="main-content p-6">
        
        <div id="mesas" class="section active">
            <h1 class="text-3xl font-bold mb-6">Mapa de Mesas</h1>
            <div id="grid-mesas" class="grid grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>

        <div id="detalhe-mesa" class="section">
            <div class="flex justify-between items-center mb-6">
                <button onclick="mudar('mesas')" class="bg-slate-200 p-3 rounded-xl font-bold hover:bg-slate-300">⬅ Voltar</button>
                <h2 class="text-2xl font-bold italic">Mesa <span id="span-num-mesa">0</span></h2>
            </div>
            <div class="grid lg:grid-cols-2 gap-8">
                <div class="cupom p-6 shadow-lg min-h-[500px] flex flex-col">
                    <div class="text-center border-b-2 border-slate-800 pb-4 mb-4">
                        <h3 class="text-xl font-bold uppercase">Boteco 934</h3>
                        <p class="text-sm font-mono" id="cupom-cliente"></p>
                    </div>
                    <div id="lista-cupom" class="flex-grow space-y-2 font-mono text-sm"></div>
                    <div class="border-t-2 border-slate-800 mt-6 pt-4 space-y-2 font-bold font-mono">
                        <div class="flex justify-between"><span>SUBTOTAL:</span><span id="cupom-subtotal">R$ 0,00</span></div>
                        <div class="flex justify-between text-orange-600"><span>TAXA (10%):</span><span id="cupom-taxa">R$ 0,00</span></div>
                        <div class="flex justify-between text-2xl border-t border-dashed border-slate-400 pt-2">
                            <span>TOTAL:</span><span id="cupom-total">R$ 0,00</span>
                        </div>
                    </div>
                </div>
                <div class="space-y-4">
                    <input id="input-barcode" type="text" placeholder="Bipe o código de barras..." class="w-full p-4 border-2 border-orange-500 rounded-2xl shadow-sm outline-none focus:ring-4 focus:ring-orange-200">
                    <div id="lista-botoes-produtos" class="grid grid-cols-2 gap-3"></div>
                    <button onclick="fecharContaFinal()" class="w-full bg-green-600 text-white p-5 rounded-2xl font-black text-xl shadow-xl hover:bg-green-700 transition-all">PAGAR E LIBERAR</button>
                </div>
            </div>
        </div>

        <div id="cadastros" class="section">
            <h1 class="text-3xl font-bold mb-6 text-yellow-600">Central de Cadastros</h1>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl shadow-md border border-slate-200">
                    <h2 class="text-xl font-bold mb-4">👥 Novo Cliente</h2>
                    <input id="cad-cli-nome" type="text" placeholder="Nome do Cliente" class="w-full p-3 mb-2 border rounded-xl">
                    <input id="cad-cli-tel" type="tel" placeholder="WhatsApp (DDD + Número)" class="w-full p-3 mb-4 border rounded-xl">
                    <button onclick="salvarCliente()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">SALVAR CLIENTE</button>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-md border border-slate-200">
                    <h2 class="text-xl font-bold mb-4">🍺 Novo Produto</h2>
                    <input id="cad-pro-nome" type="text" placeholder="Nome do Produto" class="w-full p-3 mb-2 border rounded-xl">
                    <input id="cad-pro-preco" type="number" placeholder="Preço de Venda R$" class="w-full p-3 mb-2 border rounded-xl">
                    <input id="cad-pro-code" type="text" placeholder="Código de Barras (Opcional)" class="w-full p-3 mb-4 border rounded-xl">
                    <button onclick="salvarProduto()" class="w-full bg-orange-500 text-white p-3 rounded-xl font-bold">CADASTRAR PRODUTO</button>
                </div>
            </div>
        </div>

        <div id="fiado" class="section">...</div>
        <div id="calc" class="section">...</div>
        <div id="relatorio" class="section">...</div>

    </main>

    <script>
        // CONFIGURAÇÕES DO FIREBASE (AS MESMAS DO SEU PROJETO)
        const firebaseConfig = {
            apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks",
            authDomain: "boteco934-afc3f.firebaseapp.com",
            projectId: "boteco934-afc3f",
            storageBucket: "boteco934-afc3f.firebasestorage.app",
            messagingSenderId: "182023728304",
            appId: "1:182023728304:web:040a13bb6f1c9fff35f75",
            databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let mesaAtiva = 0;
        let nomeClienteAtivo = "";

        // FUNÇÃO PARA PADRONIZAR NOMES (Maiúscula no Início)
        function pNome(str) {
            return str.toLowerCase().replace(/(^\w{1})|(\s+\w{1})/g, l => l.toUpperCase());
        }

        // --- LÓGICA DE CADASTROS ---
        function salvarCliente() {
            const nome = pNome(document.getElementById('cad-cli-nome').value.trim());
            const tel = document.getElementById('cad-cli-tel').value.trim();
            if(nome) {
                db.ref('clientes').push({ nome, tel });
                alert("Cliente salvo!");
                document.getElementById('cad-cli-nome').value = '';
                document.getElementById('cad-cli-tel').value = '';
            }
        }

        function salvarProduto() {
            const nome = pNome(document.getElementById('cad-pro-nome').value.trim());
            const preco = parseFloat(document.getElementById('cad-pro-preco').value);
            const code = document.getElementById('cad-pro-code').value.trim();
            if(nome && preco) {
                db.ref('produtos').push({ nome, preco, barcode: code });
                alert("Produto cadastrado!");
                document.getElementById('cad-pro-nome').value = '';
                document.getElementById('cad-pro-preco').value = '';
                document.getElementById('cad-pro-code').value = '';
            }
        }

        // --- CARREGAR PRODUTOS NOS BOTÕES EM TEMPO REAL ---
        db.ref('produtos').on('value', snap => {
            const lista = document.getElementById('lista-botoes-produtos');
            lista.innerHTML = '';
            const prods = [];
            snap.forEach(p => prods.push(p.val()));
            
            // Ordena alfabético
            prods.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(p => {
                const btn = document.createElement('button');
                btn.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-200 font-bold hover:border-orange-500 transition-all";
                btn.innerHTML = `${p.nome}<br><span class="text-orange-600 text-xs font-mono">R$ ${p.preco.toFixed(2)}</span>`;
                btn.onclick = () => addAoCupom(p.nome, p.preco);
                lista.appendChild(btn);
            });
            window.listaProdutosMemoria = prods;
        });

        // --- LEITOR DE CÓDIGO ---
        document.getElementById('input-barcode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const p = window.listaProdutosMemoria.find(m => m.barcode === e.target.value);
                if (p) { addAoCupom(p.nome, p.preco); e.target.value = ''; }
                else { alert("Código não encontrado!"); e.target.value = ''; }
            }
        });

        // --- SISTEMA DE MESAS E CUPOM ---
        function mudar(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function abrirPainelMesa(num, cliente) {
            mesaAtiva = num;
            nomeClienteAtivo = cliente || pNome(prompt("Quem vai ocupar a mesa " + num + "?") || "CLIENTE");
            if (!cliente) db.ref('mesas_ativas/' + num + '/cliente').set(nomeClienteAtivo);
            
            document.getElementById('span-num-mesa').innerText = num;
            document.getElementById('cupom-cliente').innerText = "ATENDENTE: BOTECO 934 | CLIENTE: " + nomeClienteAtivo;
            mudar('detalhe-mesa');
            carregarCupom(num);
        }

        function addAoCupom(item, valor) {
            db.ref('mesas_ativas/' + mesaAtiva + '/consumo').push({ item, valor, data: new Date().toLocaleTimeString() });
        }

        function carregarCupom(num) {
            db.ref('mesas_ativas/' + num + '/consumo').on('value', snap => {
                const lista = document.getElementById('lista-cupom');
                lista.innerHTML = '';
                let subtotal = 0;
                const agrupado = {};
                
                snap.forEach(c => {
                    const v = c.val();
                    if(!agrupado[v.item]) agrupado[v.item] = { qtd: 0, total: 0 };
                    agrupado[v.item].qtd++;
                    agrupado[v.item].total += v.valor;
                    subtotal += v.valor;
                });

                for (let item in agrupado) {
                    lista.innerHTML += `<div class="flex justify-between"><span>${agrupado[item].qtd}x ${item}</span><span>R$ ${agrupado[item].total.toFixed(2)}</span></div>`;
                }

                const taxa = subtotal * 0.10;
                document.getElementById('cupom-subtotal').innerText = "R$ " + subtotal.toFixed(2);
                document.getElementById('cupom-taxa').innerText = "R$ " + taxa.toFixed(2);
                document.getElementById('cupom-total').innerText = "R$ " + (subtotal + taxa).toFixed(2);
                window.totalAtualMesa = subtotal + taxa;
            });
        }

        function fecharContaFinal() {
            if (confirm("Confirmar pagamento e liberar mesa?")) {
                db.ref('vendas_gerais').push({ 
                    item: `Mesa ${mesaAtiva} (${nomeClienteAtivo})`, 
                    valor: window.totalAtualMesa, 
                    data: new Date().toLocaleString() 
                });
                db.ref('mesas_ativas/' + mesaAtiva).remove();
                mudar('mesas');
            }
        }

        // ESCUTA MAPA DE MESAS
        db.ref('mesas_ativas').on('value', snap => {
            const grid = document.getElementById('grid-mesas');
            grid.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const mesa = (snap.val() || {})[i];
                let t = 0; if (mesa && mesa.consumo) Object.values(mesa.consumo).forEach(v => t += v.valor);
                grid.innerHTML += `
                    <div onclick="abrirPainelMesa(${i}, '${mesa ? mesa.cliente : ''}')" 
                         class="mesa-card p-6 text-center shadow-sm ${mesa ? 'mesa-ocupada' : 'bg-white hover:bg-slate-50'}">
                        <div class="text-xs font-bold text-slate-400 uppercase">MESA ${i}</div>
                        <div class="font-black text-lg truncate uppercase">${mesa ? mesa.cliente : 'Vazia'}</div>
                        <div class="text-orange-600 font-bold">${t > 0 ? 'R$ ' + t.toFixed(2) : '--'}</div>
                    </div>`;
            }
        });

        // ... (As outras funções de Fiado, Calculadora e Relatório devem ser mantidas para funcionamento pleno)
    </script>
</body>
</html>
