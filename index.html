<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTECO 934 | PDV ELITE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --accent: #25d366; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 95vh; }
        
        /* Header Glassmorphism */
        .header { background: var(--card); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; margin-bottom: 15px; }
        .header h1 { margin: 0; color: var(--gold); letter-spacing: 2px; font-size: 24px; }

        /* Input de Bipe Profissional */
        .search-box { position: relative; margin-bottom: 20px; }
        #inputBipe { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--card); color: var(--gold); font-size: 18px; text-align: center; outline: none; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; }
        #inputBipe::placeholder { color: rgba(255,255,255,0.3); }

        .main-content { display: grid; grid-template-columns: 1fr 350px; gap: 20px; flex: 1; overflow: hidden; }
        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; overflow-y: auto; } }

        /* Lista de Produtos */
        .product-list { background: var(--card); border-radius: 15px; padding: 15px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        .item { display: flex; align-items: center; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; margin-bottom: 10px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .item-img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; object-fit: contain; background: white; }
        .item-info { flex: 1; }
        .item-name { display: block; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        .item-price { color: var(--gold); font-size: 13px; }
        
        /* Resumo e Botões */
        .summary-card { background: var(--card); border-radius: 15px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; height: fit-content; }
        .total-label { font-size: 14px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .total-value { font-size: 48px; font-weight: 900; color: var(--accent); margin: 10px 0; }
        
        .btn-whatsapp { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-whatsapp:active { transform: scale(0.98); }
        
        .empty-msg { text-align: center; color: rgba(255,255,255,0.2); margin-top: 100px; }
        .btn-remove { background: none; border: none; color: #ff4b2b; cursor: pointer; font-size: 18px; padding: 10px; }
    </style>
</head>

        <h1>BOTECO 934</h1>

    </div>
