<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTECO 934 | MIX INTELIGENTE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --green: #2ecc71; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .header { background: var(--card); backdrop-filter: blur(10px); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; margin-bottom: 15px; border-bottom: 3px solid var(--gold); }
        .header h1 { margin: 0; color: var(--gold); letter-spacing: 2px; font-size: 22px; }
        #inputBipe { width: 100%; padding: 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: var(--card); color: var(--gold); font-size: 18px; text-align: center; outline: none; margin-bottom: 15px; box-sizing: border-box; }
        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 15px; flex: 1; min-height: 0; }
        @media (max-width: 850px) { .main-layout { grid-template-columns: 1fr; } }
        .lista-venda { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); overflow-y: auto; }
        .item-row { display: flex; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--gold); }
        .item-img { width: 45px; height: 45px; border-radius: 5px; object-fit: contain; background: white; margin-right: 12px; }
        .item-details { flex: 1; }
        .item-name { display: block; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .item-meta { color: #94a3b8; font-size: 11px; }
        .item-lucro { color: var(--green); font-size: 11px; font-weight: bold; display: block; }
        .item-total { color: var(--green); font-weight: bold; margin: 0 10px; font-size: 16px; }
        .resumo-venda { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); height: fit-content; text-align: center; }
        .total-v { font-size: 42px; font-weight: 900; color: var(--green); margin: 10px 0; }
        .btn-zap { width: 100%; padding: 16px; border-radius: 10px; border: none; background: #25d366; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-del { background: none; border: none; color: #ff4b2b; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header"><h1>BOTECO 934 | MIX INTELIGENTE</h1></div>
    <input type="text" id="inputBipe" placeholder="BIPE O PRODUTO..." onkeypress="if(event.key === 'Enter') handleBipe(this.value)" autofocus>
    <div class="main-layout">
        <div class="lista-venda" id="caixa"></div>
        <div class="resumo-venda">
            <span style="color:#94a3b8; font-size:12px;">TOTAL DA MESA</span>
            <div class="total-v">R$ <span id="totalTxt">0,00</span></div>
            <button class="btn-zap" onclick="enviarZap()"><i class="fab fa-whatsapp"></i> ENVIAR RECIBO</button>
        </div>
    </div>
<script>
    let db = JSON.parse(localStorage.getItem('b934_db_mix')) || [];
    let mesa = [];
    const fallImg = "https://cdn-icons-png.flaticon.com/512/3121/3121784.png";

    function handleBipe(cod) {
        if(!cod) return;
        cod = cod.trim();
        document.getElementById('inputBipe').value = '';

        let jaTem = mesa.find(i => i.id === cod);
        if(jaTem) { jaTem.qtd++; render(); return; }

        let prod = db.find(p => p.id === cod);
        if(prod) { mesa.push({...prod, qtd: 1}); render(); } 
        else { buscarInternet(cod); }
    }

    async function buscarInternet(cod) {
        try {
            const r = await fetch(`https://world.openfoodfacts.org/api/v2/product/${cod}.json`);
            const d = await r.json();
            let n = (d.status === 1 && d.product.product_name) ? d.product.product_name : "Produto Novo";
            let f = (d.status === 1 && d.product.image_url) ? d.product.image_url : fallImg;
            
            let custo = prompt(`CADASTRO: ${n}\n\n1. Qual o PREÇO DE CUSTO?`, "4.00");
            if(custo) {
                let c = parseFloat(custo.replace(',','.'));
                let margem = prompt(`2. Qual a MARGEM DE LUCRO desejada? (%)`, "50");
                let m = parseFloat(margem) / 100;
                let sugerido = (c * (1 + m)).toFixed(2);
                
                let venda = prompt(`SUGESTÃO DE VENDA: R$ ${sugerido}\n(Lucro de R$ ${(sugerido - c).toFixed(2)})\n\nConfirma o PREÇO DE VENDA?`, sugerido);
                
                if(venda) {
                    let v = parseFloat(venda.replace(',','.'));
                    let novo = { id: cod, nome: n, foto: f, custo: c, preco: v };
                    db.push(novo);
                    localStorage.setItem('b934_db_mix', JSON.stringify(db));
                    mesa.push({...novo, qtd: 1});
                    render();
                }
            }
        } catch(e) { alert("Erro ao buscar."); }
    }

    function render() {
        const c = document.getElementById('caixa');
        const t = document.getElementById('totalTxt');
        c.innerHTML = ''; let soma = 0;
        if(mesa.length === 0) { c.innerHTML = '<div style="text-align:center;color:#475569;margin-top:50px;">Aguardando venda...</div>'; t.innerText="0,00"; return; }
        
        mesa.forEach(i => {
            let tot = i.preco * i.qtd; soma += tot;
            let lucroTotal = (i.preco - i.custo) * i.qtd;
            c.innerHTML += `<div class="item-row">
                <img src="${i.foto}" class="item-img" onerror="this.src='${fallImg}'">
                <div class="item-details">
                    <span class="item-name">${i.nome}</span>
                    <span class="item-meta">${i.qtd}x R$ ${i.preco.toFixed(2)}</span>
                    <span class="item-lucro">Lucro Total: R$ ${lucroTotal.toFixed(2)}</span>
                </div>
                <div class="item-total">R$ ${tot.toFixed(2)}</div>
                <button class="btn-del" onclick="mesa=mesa.filter(x=>x.id!=='${i.id}');render()"><i class="fas fa-trash"></i></button>
            </div>`;
        });
        t.innerText = soma.toFixed(2).replace('.', ',');
    }

    function enviarZap() {
        if(mesa.length === 0) return;
        let m = "*BOTECO 934 - RECIBO*\n----------------------------\n";
        mesa.forEach(i => m += `${i.qtd}x ${i.nome} - R$ ${(i.preco*i.qtd).toFixed(2)}\n`);
        m += "----------------------------\n*TOTAL: R$ " + document.getElementById('totalTxt').innerText + "*";
        window.open(`https://wa.me/?text=${encodeURIComponent(m)}`);
    }
    render();
</script>
</body>
</html>
