<script>
    // ... (mantenha suas listas de produtos e clientes)

    function atualizarModal() {
        let m = mesas[mesaSelecionada];
        document.getElementById('falta-modal').innerText = "FALTA: R$ " + m.falta.toFixed(2);
        document.getElementById('lista-pagos').innerHTML = m.pagos.map(p => `<div>✅ ${p.tipo}: R$ ${p.valor.toFixed(2)}</div>`).join('');
        
        const areaInput = document.getElementById('valor-abatimento');
        const areaBotoes = document.querySelector('#modal-pagamento div[style*="flex-wrap"]');
        const btnWhats = document.getElementById('btn-whats-final');

        // Se a conta chegou a zero, esconde os campos de valor e mostra o botão do Zap
        if (m.falta <= 0.01) {
            areaInput.style.display = 'none';
            areaBotoes.style.display = 'none';
            btnWhats.style.display = 'block';
            
            // Opcional: Já dispara a impressão automática aqui se desejar
            gerarReciboImpresso(m);
        } else {
            areaInput.style.display = 'block';
            areaBotoes.style.display = 'flex';
            btnWhats.style.display = 'none';
        }
    }

    function enviarWhatsApp() {
        let m = mesas[mesaSelecionada];
        // Remove espaços e traços do telefone
        let fone = m.fone.replace(/\D/g, ''); 
        
        if (!fone) {
            alert("⚠️ CLIENTE SEM TELEFONE CADASTRADO!");
            finalizarSistema();
            return;
        }

        let msg = `*--- BOTECO 934 ---*%0A`;
        msg += `*RECIBO DE CONSUMO*%0A%0A`;
        msg += `*CLIENTE:* ${m.cliente}%0A%0A`;
        msg += `*ITENS:*%0A`;
        m.itens.forEach(i => {
            msg += `• ${i.qtd}x ${i.nome} - R$ ${(i.qtd*i.preco).toFixed(2)}%0A`;
        });
        msg += `%0A*TOTAL: R$ ${m.total.toFixed(2)}*%0A`;
        msg += `---------------------------%0A`;
        msg += `*PAGAMENTOS:*%0A`;
        m.pagos.forEach(p => {
            msg += `✅ ${p.tipo}: R$ ${p.valor.toFixed(2)}%0A`;
        });
        msg += `%0A_Obrigado pela preferência!_`;

        window.open(`https://api.whatsapp.com/send?phone=55${fone}&text=${msg}`, '_blank');
        
        finalizarSistema();
    }

    function gerarReciboImpresso(m) {
        const win = window.open('', '', 'width=350,height=600');
        let itensTxt = m.itens.map(i => `<tr><td>${i.qtd}x</td><td>${i.nome}</td><td align="right">R$ ${(i.qtd*i.preco).toFixed(2)}</td></tr>`).join('');
        let pagosTxt = m.pagos.map(p => `${p.tipo}: R$ ${p.valor.toFixed(2)}<br>`).join('');

        win.document.write(`<html><body style="font-family:monospace;width:280px;padding:10px;"><center><strong>BOTECO 934</strong><br>RECIBO MESA ${mesaSelecionada}<br>${new Date().toLocaleString()}<br>---</center><table width="100%">${itensTxt}</table>---<br>TOTAL: R$ ${m.total.toFixed(2)}<br><div style="font-size:11px;">${pagosTxt}</div><br><center>CLIENTE: ${m.cliente}</center></body></html>`);
        win.document.close();
        win.print();
        win.close();
    }

    function finalizarSistema() {
        mesas[mesaSelecionada] = { aberta: false, cliente: "", fone: "", itens: [], total: 0, pagos: [], falta: 0 };
        mesaSelecionada = null;
        fecharModal(); 
        gerarMesas(); 
        atualizarTelaCarrinho();
    }
</script>
