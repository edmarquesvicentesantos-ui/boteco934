<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - SISTEMA FINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --green: #27ae60; --red: #ff4b2b; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .header { background: #000; color: var(--gold); text-align: center; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .caixa-bipe { width: 100%; padding: 20px; font-size: 20px; border-radius: 10px; border: 2px solid #ccc; text-align: center; margin-bottom: 15px; }
        .layout { display: grid; grid-template-columns: 1fr 350px; gap: 15px; }
        @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
        .lista-venda { background: #fff; border-radius: 12px; padding: 15px; min-height: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; gap: 10px; }
        .foto { width: 50px; height: 50px; object-fit: contain; border: 1px solid #ddd; border-radius: 5px; }
        .info { flex: 1; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        .btn-x { background: var(--red); color: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        .resumo { background: #fff; padding: 20px; border-radius: 12px; text-align: center; height: fit-content; }
        .total { font-size: 35px; font-weight: 900; color: var(--green); margin: 15px 0; }
        .btn-whats { background: #25d366; color: #fff; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body onload="atualizarEstoque()">

    <div class="header"><h1>BOTECO 934</h1></div>

    <input type="text" id="inputBipe" class="caixa-bipe" placeholder="BIPE O CÓDIGO AQUI..." onkeypress="if(event.key === 'Enter') handleBipe(this.value)">

    <div class="layout">
        <div class="lista-venda" id="carrinho">
            <p id="msg-status" style="text-align:center; color: #999; margin-top: 100px;">Sincronizando estoque...</p>
        </div>

        <div class="resumo">
            <h3>TOTAL DA MESA</h3>
            <div class="total">R$ <span id="valorTotal">0,00</span></div>
            <button class="btn-whats" onclick="enviarRecibo()">
                <i class="fa-brands fa-whatsapp"></i> RECIBO WHATSAPP
            </button>
        </div>
    </div>

<script>
    const API = "COLE_AQUI_O_LINK_DO_PASSO_1"; 
    let estoque = [];
    let vendaAtual = [];

    async function atualizarEstoque() {
        try {
            const r = await fetch(API + "?action=getEstoque");
            estoque = await r.json();
            document.getElementById('msg-status').innerText = "Pronto para vender!";
        } catch (e) {
            document.getElementById('msg-status').innerHTML = "<b style='color:red'>Erro na Planilha!</b>";
        }
    }

    async function handleBipe(cod) {
        if (!cod) return;
        cod = cod.trim();
        document.getElementById('inputBipe').value = '';

        // 1. Já está na mesa? (Evita repetir linhas)
        let jaExiste = vendaAtual.find(i => i.id === cod);
        if (jaExiste) {
            jaExiste.qtd++;
            render();
            return;
        }

        // 2. Está no estoque salvo?
        let noEstoque = estoque.find(p => p.codigo === cod);
        if (noEstoque) {
            vendaAtual.push({...noEstoque, id: cod, qtd: 1, preco: parseFloat(noEstoque.preco)});
            render();
        } else {
            // 3. Se não tem, busca na internet
            buscarNaWeb(cod);
        }
    }

    async function buscarNaWeb(cod) {
        try {
            const r = await fetch(`https://world.openfoodfacts.org/api/v2/product/${cod}.json`);
            const d = await r.json();
            let nome = (d.status === 1 && d.product.product_name) ? d.product.product_name : "ITEM NOVO";
            let foto = (d.status === 1 && d.product.image_url) ? d.product.image_url : "";
            let preco = prompt(`PRODUTO NÃO CADASTRADO: ${nome}\nPreço de Venda:`, "6.00");
            if (preco) {
                vendaAtual.push({id: cod, nome: nome, foto: foto, preco: parseFloat(preco.replace(',','.')), qtd: 1});
                render();
            }
        } catch (e) { alert("Erro ao buscar produto."); }
    }

    function excluir(id) {
        vendaAtual = vendaAtual.filter(i => i.id !== id);
        render();
    }

    function render() {
        const div = document.getElementById('carrinho');
        const tot = document.getElementById('valorTotal');
        div.innerHTML = ''; let soma = 0;

        vendaAtual.forEach(i => {
            let sub = i.preco * i.qtd;
            soma += sub;
            div.innerHTML += `
                <div class="item">
                    <img src="${i.foto}" class="foto" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3121/3121784.png'">
                    <div class="info">${i.qtd}x ${i.nome}<br><small>R$ ${i.preco.toFixed(2)}</small></div>
                    <div style="font-weight:bold; margin-right:10px">R$ ${sub.toFixed(2)}</div>
                    <button class="btn-x" onclick="excluir('${i.id}')"><i class="fa-solid fa-trash"></i></button>
                </div>`;
        });
        tot.innerText = soma.toFixed(2).replace('.', ',');
    }

    function enviarRecibo() {
        if (vendaAtual.length === 0) return;
        let texto = "*BOTECO 934 - RECIBO*\n--------------------\n";
        vendaAtual.forEach(i => texto += `${i.qtd}x ${i.nome} - R$ ${(i.preco * i.qtd).toFixed(2)}\n`);
        texto += "--------------------\n*TOTAL: R$ " + document.getElementById('valorTotal').innerText + "*";
        window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
    }
</script>
</body>
</html>
