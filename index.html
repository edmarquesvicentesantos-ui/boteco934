<div class="container">
    <h2>Cadastro de Produto: Destilados e Bebidas</h2>
    
    <div class="grid-form">
        <div class="input-group">
            <label>Custo da Caixa (R$)</label>
            <input type="number" id="custoCaixa" oninput="calcularTudo()" step="0.01">
        </div>
        <div class="input-group">
            <label>Qtd Unidades na Caixa</label>
            <input type="number" id="qtdUnidades" oninput="calcularTudo()">
        </div>
        <div class="input-group">
            <label>Markup Desejado (%)</label>
            <input type="number" id="markup" oninput="calcularTudo()" value="50">
        </div>
    </div>

    <hr>

    <div class="resultados">
        <h3>Sugestões de Venda e Margens</h3>
        <table border="1" id="tabelaPrecos">
            <thead>
                <tr>
                    <th>Modalidade</th>
                    <th>Custo Un./Dose</th>
                    <th>Preço Sugerido</th>
                    <th>Lucro Real (R$)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Unidade Natural</td>
                    <td id="c-un-nat">-</td>
                    <td><input type="number" id="p-un-nat"></td>
                    <td id="l-un-nat">-</td>
                </tr>
                <tr>
                    <td>Unidade Gelada (+15%)</td>
                    <td id="c-un-gel">-</td>
                    <td><input type="number" id="p-un-gel"></td>
                    <td id="l-un-gel">-</td>
                </tr>
                <tr>
                    <td>Dose (Destilados)</td>
                    <td id="c-dose">-</td>
                    <td><input type="number" id="p-dose"></td>
                    <td id="l-dose">-</td>
                </tr>
            </tbody>
        </table>
    </div>
    <button onclick="salvarNoFirebase()">Salvar Produto e Preços</button>
</div>
