<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDV Elite - Boteco 934</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #f0f2f5; color: #1c1e21; font-family: sans-serif; }
        .sidebar { width: 240px; background: #1a252f; color: white; height: 100vh; position: fixed; z-index: 50; }
        .main-content { margin-left: 240px; width: calc(100% - 240px); min-height: 100vh; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.2s; }
        .cupom { background: #fff; border: 1px dashed #000; font-family: 'Courier New', Courier, monospace; }
        .mesa-card { transition: 0.2s; cursor: pointer; border-radius: 12px; }
        .mesa-ocupada { border-top: 6px solid #ef4444; background: #fff; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .menu-text { display: none; }
            .main-content { margin-left: 60px; width: calc(100% - 60px); }
        }
    </style>
</head>
<body>

    <div class="sidebar p-4 shadow-xl">
        <h2 class="text-xl font-bold mb-8 text-center menu-text border-b border-gray-700 pb-2 text-yellow-500 uppercase">Boteco 934</h2>
        <nav class="space-y-2 text-sm">
            <button onclick="mudar('mesas')" class="w-full p-3 rounded hover:bg-orange-600 flex items-center bg-orange-500 font-bold"><span>🪑</span><span class="ml-3 menu-text">MESAS</span></button>
            <button onclick="mudar('fiado')" class="w-full p-3 rounded hover:bg-red-600 flex items-center"><span>📝</span><span class="ml-3 menu-text">FIADO</span></button>
            <button onclick="mudar('calc')" class="w-full p-3 rounded hover:bg-green-600 flex items-center"><span>🧮</span><span class="ml-3 menu-text">CALCULADORA</span></button>
            <button onclick="mudar('relatorio')" class="w-full p-3 rounded hover:bg-gray-700 flex items-center"><span>📊</span><span class="ml-3 menu-text">CAIXA</span></button>
        </nav>
    </div>

    <main class="main-content p-4">
        
        <div id="mesas" class="section active">
            <h1 class="text-2xl font-bold mb-4 text-gray-800">Mapa de Mesas</h1>
            <div id="grid-mesas" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>

        <div id="detalhe-mesa" class="section">
            <div class="flex justify-between items-center mb-4">
                <button onclick="mudar('mesas')" class="bg-gray-800 text-white px-4 py-2 rounded font-bold text-sm">⬅ VOLTAR</button>
                <h2 class="text-xl font-bold italic">Comanda Mesa <span id="span-num-mesa">0</span></h2>
            </div>
            <div class="grid md:grid-cols-2 gap-6">
                <div class="cupom p-4 shadow-inner min-h-[400px] flex flex-col border border-gray-300">
                    <div class="text-center border-b border-black pb-2 mb-2">
                        <h3 class="font-bold">BOTECO 934</h3>
                        <p class="text-[10px]" id="cupom-cliente"></p>
                    </div>
                    <div id="lista-cupom" class="flex-grow text-xs space-y-1"></div>
                    <div class="border-t border-black mt-4 pt-2 text-sm space-y-1">
                        <div class="flex justify-between"><span>SUBTOTAL:</span><span id="cupom-subtotal">R$ 0,00</span></div>
                        <div class="flex justify-between text-blue-600"><span>TX SERVIÇO (10%):</span><span id="cupom-taxa">R$ 0,00</span></div>
                        <div class="flex justify-between font-bold text-lg border-t border-dashed border-black pt-1"><span>TOTAL:</span><span id="cupom-total">R$ 0,00</span></div>
                    </div>
                    <div class="text-center mt-4 text-[10px] italic">Obrigado por visitar o Boteco 934!</div>
                </div>
                <div class="space-y-4">
                    <input id="input-barcode" type="text" placeholder="Bipar código..." class="w-full p-3 border-2 border-orange-500 rounded-lg shadow-sm">
                    <div id="lista-botoes-produtos" class="grid grid-cols-2 gap-2"></div>
                    <button onclick="fecharContaFinal()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold shadow-lg hover:bg-green-700">FECHAR CONTA / PAGAR</button>
                </div>
            </div>
        </div>

        <div id="fiado" class="section">
            <h1 class="text-2xl font-bold mb-4 text-red-600">Controle de Fiado</h1>
            <div class="bg-white p-4 rounded-xl shadow mb-6 border border-red-100">
                <input id="cliente-nome" type="text" placeholder="Nome do Cliente" class="w-full p-2 mb-2 border rounded">
                <input id="cliente-contato" type="tel" placeholder="WhatsApp (Ex: 87999998888)" class="w-full p-2 mb-2 border rounded">
                <input id="cliente-valor" type="number" placeholder="Valor R$" class="w-full p-2 mb-2 border rounded font-bold">
                <button onclick="lancarFiado()" class="w-full bg-red-600 text-white p-3 rounded font-bold uppercase">Lançar no Pendura</button>
            </div>
            <div id="lista-fiado" class="space-y-2"></div>
        </div>

        <div id="calc" class="section">
            <h1 class="text-2xl font-bold mb-4 text-green-700">Calculadoras</h1>
            <div class="bg-white p-4 rounded-xl shadow border mb-4">
                <h2 class="font-bold mb-2 uppercase text-xs">Mix Inteligente (Preço/Litro)</h2>
                <input id="mix-preco" type="number" placeholder="Preço R$" class="p-2 border rounded mr-2 w-24">
                <input id="mix-ml" type="number" placeholder="ML (350, 473...)" class="p-2 border rounded w-32">
                <button onclick="calcularMix()" class="bg-green-600 text-white p-2 rounded ml-2 font-bold">Calcular</button>
                <p id="res-mix" class="mt-2 font-bold text-green-700"></p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow border">
                <h2 class="font-bold mb-2 uppercase text-xs">Custo por Dose</h2>
                <input id="d-preco" type="number" placeholder="Preço Garrafa R$" class="w-full p-2 border rounded mb-2">
                <input id="d-mlg" type="number" placeholder="ML Garrafa (700, 1000)" class="w-full p-2 border rounded mb-2">
                <input id="d-mld" type="number" placeholder="ML Dose (50)" class="w-full p-2 border rounded mb-2">
                <button onclick="calcularDose()" class="w-full bg-blue-600 text-white p-2 rounded font-bold">Calcular Custo</button>
                <p id="res-dose" class="mt-2 font-bold text-blue-700"></p>
            </div>
        </div>

        <div id="relatorio" class="section">
            <h1 class="text-2xl font-bold mb-4">Caixa Geral</h1>
            <div id="total-geral" class="text-4xl font-bold text-green-600 mb-6 bg-white p-4 rounded shadow border-2 border-green-200 inline-block font-mono">R$ 0,00</div>
            <div id="historico-vendas" class="bg-white p-4 rounded shadow space-y-2 max-h-96 overflow-y-auto text-sm"></div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks",
            authDomain: "boteco934-afc3f.firebaseapp.com",
            projectId: "boteco934-afc3f",
            storageBucket: "boteco934-afc3f.firebasestorage.app",
            messagingSenderId: "182023728304",
            appId: "1:182023728304:web:040a13bb6f1c9fff35f75",
            databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let mesaAtiva = 0;
        let nomeClienteAtivo = "";

        const mercadorias = [
            { n: 'Cerveja Lata', p: 6.00, barcode: '7891234567890' },
            { n: 'Cerveja Garrafa', p: 12.00, barcode: '' },
            { n: 'Dose Cana', p: 3.00, barcode: '' },
            { n: 'Espetinho', p: 8.00, barcode: '' },
            { n: 'Refrigerante', p: 5.00, barcode: '7891149200003' }
        ].sort((a, b) => a.n.localeCompare(b.n));

        function formatarNome(str) {
            return str.toLowerCase().replace(/(^\w{1})|(\s+\w{1})/g, l => l.toUpperCase());
        }

        function mudar(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- SISTEMA DE MESAS ---
        function abrirPainelMesa(num, cliente) {
            mesaAtiva = num;
            nomeClienteAtivo = cliente || formatarNome(prompt("Nome do Cliente:") || "CLIENTE");
            if (!cliente) db.ref('mesas_ativas/' + num + '/cliente').set(nomeClienteAtivo);
            document.getElementById('span-num-mesa').innerText = num;
            document.getElementById('cupom-cliente').innerText = "CLIENTE: " + nomeClienteAtivo;
            mudar('detalhe-mesa');
            carregarCupom(num);
        }

        function addAoCupom(item, valor) {
            db.ref('mesas_ativas/' + mesaAtiva + '/consumo').push({ item, valor, data: new Date().toLocaleTimeString() });
        }

        function carregarCupom(num) {
            db.ref('mesas_ativas/' + num + '/consumo').on('value', snap => {
                const lista = document.getElementById('lista-cupom');
                lista.innerHTML = '';
                let sub = 0;
                const agrupado = {};
                snap.forEach(c => {
                    const v = c.val();
                    agrupado[v.item] = (agrupado[v.item] || 0) + 1;
                    sub += v.valor;
                });
                for (let item in agrupado) {
                    const precoProd = mercadorias.find(m => m.n === item)?.p || 0;
                    lista.innerHTML += `<div class="flex justify-between"><span>${agrupado[item]}x ${item}</span><span>R$ ${(agrupado[item] * precoProd).toFixed(2)}</span></div>`;
                }
                const tx = sub * 0.10;
                document.getElementById('cupom-subtotal').innerText = "R$ " + sub.toFixed(2);
                document.getElementById('cupom-taxa').innerText = "R$ " + tx.toFixed(2);
                document.getElementById('cupom-total').innerText = "R$ " + (sub + tx).toFixed(2);
                window.totalAtualMesa = sub + tx;
            });
        }

        function fecharContaFinal() {
            if (confirm("Fechar conta e liberar mesa?")) {
                db.ref('vendas_gerais').push({ item: `Mesa ${mesaAtiva} (${nomeClienteAtivo})`, valor: window.totalAtualMesa, data: new Date().toLocaleString() });
                db.ref('mesas_ativas/' + mesaAtiva).remove();
                mudar('mesas');
            }
        }

        // --- SISTEMA DE FIADO ---
        function lancarFiado() {
            const nome = formatarNome(document.getElementById('cliente-nome').value.trim());
            const tel = document.getElementById('cliente-contato').value.trim();
            const valor = parseFloat(document.getElementById('cliente-valor').value);
            if(nome && valor) {
                db.ref('fiado/' + nome).transaction(a => {
                    const at = a || { saldo: 0, telefone: tel };
                    return { saldo: (at.saldo || 0) + valor, telefone: tel || at.telefone || '' };
                });
                document.getElementById('cliente-nome').value = '';
                document.getElementById('cliente-valor').value = '';
            }
        }

        // --- CALCULADORAS ---
        function calcularMix() {
            const p = parseFloat(document.getElementById('mix-preco').value);
            const ml = parseFloat(document.getElementById('mix-ml').value);
            if(p && ml) document.getElementById('res-mix').innerText = "R$ " + ((p/ml)*1000).toFixed(2) + " /Litro";
        }
        function calcularDose() {
            const p = parseFloat(document.getElementById('d-preco').value);
            const mlG = parseFloat(document.getElementById('d-mlg').value);
            const mlD = parseFloat(document.getElementById('d-mld').value);
            if(p && mlG && mlD) document.getElementById('res-dose').innerText = "Custo Dose: R$ " + ((p/mlG)*mlD).toFixed(2);
        }

        // --- ESCUTAS FIREBASE ---
        db.ref('mesas_ativas').on('value', snap => {
            const grid = document.getElementById('grid-mesas'); grid.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const mesa = (snap.val() || {})[i];
                let t = 0; if (mesa && mesa.consumo) Object.values(mesa.consumo).forEach(v => t += v.valor);
                grid.innerHTML += `<div onclick="abrirPainelMesa(${i}, '${mesa ? mesa.cliente : ''}')" class="mesa-card p-4 shadow-md border text-center ${mesa ? 'mesa-ocupada' : 'bg-white'}">
                    <div class="text-[10px] font-bold text-gray-400 uppercase">Mesa ${i}</div>
                    <div class="font-bold truncate text-sm uppercase">${mesa ? mesa.cliente : 'Livre'}</div>
                    <div class="text-red-600 font-bold text-sm">${t > 0 ? 'R$ ' + t.toFixed(2) : '--'}</div></div>`;
            }
        });

        db.ref('fiado').on('value', snap => {
            const lista = document.getElementById('lista-fiado'); lista.innerHTML = '';
            const cls = []; snap.forEach(p => { if(p.val().saldo > 0) cls.push({ n: p.key, v: p.val().saldo, t: p.val().telefone }); });
            cls.sort((a,b) => a.n.localeCompare(b.n)).forEach(c => {
                lista.innerHTML += `<div class="bg-white p-3 rounded shadow flex justify-between items-center text-sm border-l-4 border-red-500">
                    <span><b>${c.n}</b><br>R$ ${c.v.toFixed(2)}</span>
                    <button onclick="window.open('https://api.whatsapp.com/send?phone=55${c.t}&text=Olá ${c.n}, saldo no Boteco 934: R$ ${c.v.toFixed(2)}')" class="bg-green-500 text-white p-2 rounded text-[10px] font-bold">WHATSAPP</button></div>`;
            });
        });

        db.ref('vendas_gerais').on('value', s => {
            let t = 0; const h = document.getElementById('historico-vendas'); h.innerHTML = '';
            s.forEach(v => { t += v.val().valor; h.insertAdjacentHTML('afterbegin', `<div class="flex justify-between border-b py-1"><span>${v.val().item}</span><b>R$ ${v.val().valor.toFixed(2)}</b></div>`); });
            document.getElementById('total-geral').innerText = 'R$ ' + t.toFixed(2);
        });

        // RENDER BOTÕES PRODUTOS
        document.getElementById('lista-botoes-produtos').innerHTML = mercadorias.map(m => `
            <button onclick="addAoCupom('${m.n}', ${m.p})" class="bg-white p-3 rounded shadow border font-bold text-[10px] uppercase hover:bg-orange-50">${m.n}<br>R$ ${m.p.toFixed(2)}</button>
        `).join('');

        document.getElementById('input-barcode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const p = mercadorias.find(m => m.barcode === e.target.value);
                if (p) { addAoCupom(p.n, p.p); e.target.value = ''; }
            }
        });
    </script>
</body>
</html>
