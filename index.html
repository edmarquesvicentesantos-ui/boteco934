<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDV Elite - Boteco 934</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .btn-pdv { transition: all 0.2s; border: 1px solid #333; }
        .btn-pdv:active { transform: scale(0.95); background-color: #222; }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-yellow-500">BOTECO 934</h1>
            <p class="text-xs text-gray-400">SISTEMA EM NUVEM</p>
        </div>
        <div id="status-conexao" class="h-3 w-3 rounded-full bg-red-500"></div>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <button onclick="registrarVenda('Cerveja Lata', 6.00)" class="btn-pdv p-6 rounded-xl flex flex-col items-center">
            <span class="text-3xl mb-2">🍺</span>
            <span>Cerveja Lata</span>
            <span class="text-yellow-500 font-bold">R$ 6,00</span>
        </button>
        <button onclick="registrarVenda('Dose Cana', 3.00)" class="btn-pdv p-6 rounded-xl flex flex-col items-center">
            <span class="text-3xl mb-2">🥃</span>
            <span>Dose Cana</span>
            <span class="text-yellow-500 font-bold">R$ 3,00</span>
        </button>
    </div>

    <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
        <h2 class="text-lg font-semibold mb-4 border-b border-gray-800 pb-2">Vendas Hoje (Nuvem)</h2>
        <div id="lista-vendas" class="space-y-2 max-h-60 overflow-y-auto mb-4">
            </div>
        <div class="flex justify-between text-xl font-bold text-green-500 pt-2 border-t border-gray-800">
            <span>TOTAL:</span>
            <span id="total-dia">R$ 0,00</span>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO QUE VOCÊ ME MANDOU
        const firebaseConfig = {
            apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks",
            authDomain: "boteco934-afc3f.firebaseapp.com",
            projectId: "boteco934-afc3f",
            storageBucket: "boteco934-afc3f.firebasestorage.app",
            messagingSenderId: "182023728304",
            appId: "1:182023728304:web:040a13bb6f1c9fff35f75",
            databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com/" 
        };

        // INICIALIZAR FIREBASE
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ELEMENTOS DA TELA
        const statusConexao = document.getElementById('status-conexao');
        const listaVendas = document.getElementById('lista-vendas');
        const totalDiaLabel = document.getElementById('total-dia');

        // FUNÇÃO PARA REGISTRAR VENDA
        function registrarVenda(produto, valor) {
            const novaVenda = {
                item: produto,
                preco: valor,
                hora: new Date().toLocaleTimeString(),
                data: new Date().toLocaleDateString()
            };
            
            database.ref('vendas').push(novaVenda);
            alert(produto + ' registrado na nuvem!');
        }

        // ESCUTAR O BANCO DE DADOS (TEMPO REAL)
        database.ref('vendas').on('value', (snapshot) => {
            statusConexao.classList.replace('bg-red-500', 'bg-green-500');
            listaVendas.innerHTML = '';
            let total = 0;

            snapshot.forEach((item) => {
                const venda = item.val();
                total += venda.preco;

                const div = document.createElement('div');
                div.className = "flex justify-between text-sm text-gray-300";
                div.innerHTML = `<span>${venda.hora} - ${venda.item}</span><span>R$ ${venda.preco.toFixed(2)}</span>`;
                listaVendas.prepend(div);
            });

            totalDiaLabel.innerText = 'R$ ' + total.toFixed(2);
        });
    </script>
</body>
</html>
