<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDV Elite - Boteco 934</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #f0f2f5; color: #1c1e21; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { width: 240px; background: #1a252f; color: white; height: 100vh; position: fixed; z-index: 50; }
        .main-content { margin-left: 240px; width: calc(100% - 240px); min-height: 100vh; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.2s; }
        .cupom { background: #fff; border: 1px dashed #ccc; font-family: 'Courier New', Courier, monospace; }
        .mesa-card { transition: transform 0.2s; cursor: pointer; border-radius: 12px; }
        .mesa-ocupada { border-top: 6px solid #ef4444; background: #fff; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .menu-text { display: none; }
            .main-content { margin-left: 60px; width: calc(100% - 60px); }
        }
    </style>
</head>
<body>

    <div class="sidebar p-4 shadow-xl">
        <h2 class="text-xl font-bold mb-8 text-center menu-text border-b border-gray-700 pb-2 text-yellow-500 uppercase">Boteco 934</h2>
        <nav class="space-y-2 text-sm">
            <button onclick="mudar('mesas')" class="w-full p-3 rounded hover:bg-orange-600 flex items-center bg-orange-500 font-bold"><span>🪑</span><span class="ml-3 menu-text">MESAS</span></button>
            <button onclick="mudar('fiado')" class="w-full p-3 rounded hover:bg-red-600 flex items-center"><span>📝</span><span class="ml-3 menu-text">FIADO</span></button>
            <button onclick="mudar('calc')" class="w-full p-3 rounded hover:bg-green-600 flex items-center"><span>🧮</span><span class="ml-3 menu-text">CALCULADORA</span></button>
            <button onclick="mudar('relatorio')" class="w-full p-3 rounded hover:bg-gray-700 flex items-center text-gray-400"><span>📊</span><span class="ml-3 menu-text">CAIXA</span></button>
        </nav>
    </div>

    <main class="main-content p-4">
        
        <div id="mesas" class="section active">
            <h1 class="text-2xl font-bold mb-4 text-gray-800">Mapa de Mesas</h1>
            <div id="grid-mesas" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>

        <div id="detalhe-mesa" class="section">
            <div class="flex justify-between items-center mb-4">
                <button onclick="mudar('mesas')" class="bg-gray-800 text-white px-4 py-2 rounded font-bold text-sm">⬅ VOLTAR</button>
                <h2 class="text-xl font-bold">Mesa <span id="span-num-mesa">0</span></h2>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="cupom p-4 shadow-inner min-h-[400px] flex flex-col">
                    <div class="text-center border-b border-black pb-2 mb-2">
                        <h3 class="font-bold">BOTECO 934</h3>
                        <p class="text-[10px]">EXTRATO DE CONSUMO</p>
                        <p class="text-[10px]" id="cupom-cliente"></p>
                    </div>
                    
                    <div id="lista-cupom" class="flex-grow text-xs space-y-1">
                        </div>

                    <div class="border-t border-black mt-4 pt-2 text-sm space-y-1">
                        <div class="flex justify-between"><span>SUBTOTAL:</span><span id="cupom-subtotal">R$ 0,00</span></div>
                        <div class="flex justify-between text-blue-600"><span>TX SERVIÇO (10%):</span><span id="cupom-taxa">R$ 0,00</span></div>
                        <div class="flex justify-between font-bold text-lg border-t border-dashed border-black pt-1">
                            <span>TOTAL:</span><span id="cupom-total">R$ 0,00</span>
                        </div>
                    </div>
                    <div class="text-center mt-4 text-[10px] italic">
                        Obrigado por visitar o Boteco 934!
                    </div>
                </div>

                <div class="space-y-4">
                    <input id="input-barcode" type="text" placeholder="Bipar código..." class="w-full p-3 border-2 border-orange-500 rounded-lg shadow-sm">
                    <div id="lista-botoes-produtos" class="grid grid-cols-2 gap-2"></div>
                    <button onclick="fecharContaFinal()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold shadow-lg hover:bg-green-700">FECHAR CONTA E PAGAR</button>
                </div>
            </div>
        </div>

        <div id="fiado" class="section">...</div>
        <div id="calc" class="section">...</div>
        <div id="relatorio" class="section">...</div>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks",
            authDomain: "boteco934-afc3f.firebaseapp.com",
            projectId: "boteco934-afc3f",
            storageBucket: "boteco934-afc3f.firebasestorage.app",
            messagingSenderId: "182023728304",
            appId: "1:182023728304:web:040a13bb6f1c9fff35f75",
            databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let mesaAtiva = 0;
        let nomeClienteAtivo = "";

        const mercadorias = [
            { n: 'Cerveja Lata', p: 6.00, barcode: '7891234567890' },
            { n: 'Cerveja Garrafa', p: 12.00, barcode: '' },
            { n: 'Dose Cana', p: 3.00, barcode: '' },
            { n: 'Espetinho', p: 8.00, barcode: '' },
            { n: 'Refrigerante', p: 5.00, barcode: '7891149200003' }
        ].sort((a, b) => a.n.localeCompare(b.n));

        function formatarNome(str) {
            return str.toLowerCase().replace(/(^\w{1})|(\s+\w{1})/g, l => l.toUpperCase());
        }

        function mudar(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // RENDERIZAR BOTÕES DE PRODUTOS
        document.getElementById('lista-botoes-produtos').innerHTML = mercadorias.map(m => `
            <button onclick="addAoCupom('${m.n}', ${m.p})" class="bg-white p-3 rounded shadow border font-bold text-xs uppercase hover:bg-orange-50">
                ${m.n}<br><span class="text-blue-600">R$ ${m.p.toFixed(2)}</span>
            </button>
        `).join('');

        // LEITOR DE CÓDIGO
        document.getElementById('input-barcode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const p = mercadorias.find(m => m.barcode === e.target.value);
                if (p) { addAoCupom(p.n, p.p); e.target.value = ''; }
            }
        });

        // ABRIR MESA
        function abrirPainelMesa(num, cliente) {
            mesaAtiva = num;
            nomeClienteAtivo = cliente || formatarNome(prompt("Nome do Cliente:") || "CLIENTE");
            if (!cliente) db.ref('mesas_ativas/' + num + '/cliente').set(nomeClienteAtivo);
            
            document.getElementById('span-num-mesa').innerText = num;
            document.getElementById('cupom-cliente').innerText = "CLIENTE: " + nomeClienteAtivo;
            mudar('detalhe-mesa');
            carregarCupom(num);
        }

        function addAoCupom(item, valor) {
            db.ref('mesas_ativas/' + mesaAtiva + '/consumo').push({ item, valor, data: new Date().toLocaleTimeString() });
        }

        function carregarCupom(num) {
            db.ref('mesas_ativas/' + num + '/consumo').on('value', snap => {
                const lista = document.getElementById('lista-cupom');
                lista.innerHTML = '';
                let subtotal = 0;
                
                // Agrupar itens iguais para somar quantidade
                const agrupado = {};
                snap.forEach(child => {
                    const v = child.val();
                    if (!agrupado[v.item]) agrupado[v.item] = { qtd: 0, total: 0 };
                    agrupado[v.item].qtd++;
                    agrupado[v.item].total += v.valor;
                    subtotal += v.valor;
                });

                for (let item in agrupado) {
                    lista.innerHTML += `
                        <div class="flex justify-between">
                            <span>${agrupado[item].qtd}x ${item}</span>
                            <span>R$ ${agrupado[item].total.toFixed(2)}</span>
                        </div>`;
                }

                const taxa = subtotal * 0.10;
                document.getElementById('cupom-subtotal').innerText = "R$ " + subtotal.toFixed(2);
                document.getElementById('cupom-taxa').innerText = "R$ " + taxa.toFixed(2);
                document.getElementById('cupom-total').innerText = "R$ " + (subtotal + taxa).toFixed(2);
                
                // Variável global para o fechamento
                window.totalAtualMesa = subtotal + taxa;
            });
        }

        function fecharContaFinal() {
            if (confirm("Deseja fechar a conta e liberar a mesa?")) {
                db.ref('vendas_gerais').push({ 
                    item: `Mesa ${mesaAtiva} (${nomeClienteAtivo})`, 
                    valor: window.totalAtualMesa, 
                    data: new Date().toLocaleString() 
                });
                db.ref('mesas_ativas/' + mesaAtiva).remove();
                mudar('mesas');
            }
        }

        // MAPA DE MESAS (ESCUTA)
        db.ref('mesas_ativas').on('value', snap => {
            const grid = document.getElementById('grid-mesas');
            grid.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const mesa = (snap.val() || {})[i];
                let totalMesa = 0;
                if (mesa && mesa.consumo) Object.values(mesa.consumo).forEach(v => totalMesa += v.valor);
                
                grid.innerHTML += `
                    <div onclick="abrirPainelMesa(${i}, '${mesa ? mesa.cliente : ''}')" 
                         class="mesa-card p-4 shadow-md border text-center ${mesa ? 'mesa-ocupada' : 'bg-white hover:bg-gray-50'}">
                        <div class="text-[10px] font-bold text-gray-400">MESA ${i}</div>
                        <div class="font-bold truncate text-sm">${mesa ? mesa.cliente : 'DISPONÍVEL'}</div>
                        <div class="text-red-600 font-bold text-sm">${totalMesa > 0 ? 'R$ ' + totalMesa.toFixed(2) : '--'}</div>
                    </div>`;
            }
        });
        
        // (Outras funções de Fiado e Relatório permanecem as mesmas das versões anteriores)
    </script>
</body>
</html>
