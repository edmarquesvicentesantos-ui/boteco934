<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Elite - Boteco 934</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a252f; color: #333; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #container { display: flex; width: 100%; padding: 10px; gap: 10px; box-sizing: border-box; }
        .painel { background: #ecf0f1; padding: 15px; border-radius: 8px; flex: 1; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { margin: 0 0 10px 0; border-bottom: 3px solid #27ae60; color: #2c3e50; font-size: 16px; text-transform: uppercase; }
        
        #mapa-mesas { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .mesa { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 11px; transition: 0.2s; }
        .mesa-livre { background: #27ae60; }
        .mesa-ocupada { background: #e74c3c; }
        .mesa-selecionada { border: 4px solid #f1c40f !important; transform: scale(1.05); }

        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; text-transform: uppercase; }
        .carrinho-area { flex-grow: 1; background: #fff; border: 1px solid #ddd; margin: 10px 0; padding: 5px; overflow-y: auto; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #dcdde1; padding: 8px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        
        .total-destaque { font-size: 26px; font-weight: bold; background: #2c3e50; color: white; padding: 12px; text-align: center; border-radius: 4px; }
        .btn-abrir-fechamento { background: #27ae60; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; width: 100%; }

        /* MODAL DE PAGAMENTO DIVIDIDO */
        #modal-pagamento { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 20px; border-radius: 8px; width: 420px; text-align: center; }
        .valor-restante { font-size: 32px; color: #e74c3c; font-weight: bold; margin: 10px 0; }
        .metodo-btn { padding: 12px; margin: 5px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; width: 45%; font-size: 12px; color: white; }
        .btn-whatsapp { background: #25d366; color: white; padding: 15px; border: none; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; display: none; }
    </style>
</head>
<body>

<div id="container">
    <div class="painel">
        <h2>📍 MAPA DE MESAS</h2>
        <div id="mapa-mesas"></div>
        <h2 id="titulo-mesa">🛒 SELECIONE UMA MESA</h2>
        <input type="text" id="busca-prod" placeholder="🔍 BUSCAR PRODUTO..." oninput="filtrarProdutos()">
        <select id="select-produtos" size="8" ondblclick="addCarrinho()"></select>
        <div class="carrinho-area">
            <table id="tabela-itens">
                <thead><tr><th>QTD</th><th>ITEM</th><th>TOTAL</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="total-destaque" id="display-total">TOTAL: R$ 0,00</div>
    </div>

    <div class="painel" style="max-width: 380px;">
        <h2>👤 CLIENTE</h2>
        <input type="text" id="busca-cli" placeholder="🔍 BUSCAR CLIENTE..." oninput="filtrarClientes()">
        <select id="select-clientes" size="5" onchange="atualizarDadosCliente()"></select>
        <input type="text" id="whatsapp-cliente" placeholder="📱 WHATSAPP (EX: 87999999999)">
        <div id="info-status" style="background: #d1d8e0; padding: 10px; border-radius: 4px; margin: 10px 0; font-weight: bold; text-align: center;">AGUARDANDO SELEÇÃO</div>
        <button class="btn-abrir-fechamento" onclick="abrirModal()">FECHAR CONTA / ABATER</button>
    </div>
</div>

<div id="modal-pagamento">
    <div class="modal-content">
        <h2 id="nome-cliente-modal">FECHANDO CONTA</h2>
        <div class="valor-restante" id="falta-modal">FALTA: R$ 0,00</div>
        
        <div id="area-abatimento">
            <input type="number" id="valor-abatimento" placeholder="VALOR RECEBIDO (R$)" step="0.01" style="font-size: 20px; text-align: center;">
            <div style="display: flex; flex-wrap: wrap; justify-content: center;">
                <button class="metodo-btn" style="background: #2ecc71;" onclick="registrarAbatimento('DINHEIRO')">💵 DINHEIRO</button>
                <button class="metodo-btn" style="background: #3498db;" onclick="registrarAbatimento('PIX')">📱 PIX</button>
                <button class="metodo-btn" style="background: #f1c40f; color: black;" onclick="registrarAbatimento('CARTÃO')">💳 CARTÃO</button>
                <button class="metodo-btn" style="background: #e67e22;" onclick="registrarAbatimento('PENDURA')">📝 PENDURA</button>
            </div>
        </div>

        <hr>
        <div id="lista-pagos" style="text-align: left; font-size: 13px; margin-bottom: 10px; background: #f9f9f9; padding: 5px;"></div>
        
        <button id="btn-whats-final" class="btn-whatsapp" onclick="finalizarComWhatsApp()">✅ ENVIAR WHATSAPP E FINALIZAR</button>
        <button id="btn-cancelar-modal" onclick="fecharModal()" style="background:#95a5a6; color:white; padding:10px; border:none; width:100%; cursor:pointer; border-radius:4px;">VOLTAR</button>
    </div>
</div>

<script>
    let produtos = [{ nome: "CERVEJA LATA", preco: 6.00 }, { nome: "CERVEJA 600ML", preco: 10.00 }, { nome: "REFRIGERANTE 2L", preco: 12.00 }, { nome: "DOSES CANA", preco: 4.00 }];
    let clientes = [{ nome: "ADRIANO SILVA", fone: "87988001122" }, { nome: "MARIA SOUZA", fone: "87988112233" }, { nome: "CONSUMIDOR", fone: "" }];
    
    let mesas = {};
    for(let i=1; i<=12; i++) { mesas[i] = { aberta: false, cliente: "", fone: "", itens: [], total: 0, pagos: [], falta: 0 }; }
    let mesaSelecionada = null;

    function iniciar() { gerarMesas(); filtrarProdutos(); filtrarClientes(); }

    function atualizarDadosCliente() {
        const s = document.getElementById('select-clientes');
        const fone = s.options[s.selectedIndex].getAttribute('data-fone');
        document.getElementById('whatsapp-cliente').value = fone || "";
    }

    function gerarMesas() {
        const div = document.getElementById('mapa-mesas');
        div.innerHTML = "";
        for(let i=1; i<=12; i++) {
            let btn = document.createElement('button');
            btn.className = `mesa ${mesas[i].aberta ? 'mesa-ocupada' : 'mesa-livre'} ${mesaSelecionada == i ? 'mesa-selecionada' : ''}`;
            btn.innerText = `MESA ${i.toString().padStart(2, '0')}`;
            btn.onclick = () => selecionarMesa(i);
            div.appendChild(btn);
        }
    }

    function selecionarMesa(id) {
        if (!mesas[id].aberta) {
            const cli = document.getElementById('select-clientes').value;
            const fone = document.getElementById('whatsapp-cliente').value;
            if (!cli) { alert("⚠️ SELECIONE O CLIENTE PRIMEIRO!"); return; }
            mesas[id].aberta = true; mesas[id].cliente = cli; mesas[id].fone = fone;
        }
        mesaSelecionada = id;
        document.getElementById('titulo-mesa').innerText = `🛒 MESA ${id} - ${mesas[id].cliente}`;
        document.getElementById('info-status').innerText = `MESA ${id} ATIVA`;
        gerarMesas(); atualizarTelaCarrinho();
    }

    function addCarrinho() {
        if (!mesaSelecionada) return;
        const s = document.getElementById('select-produtos');
        if (s.selectedIndex === -1) return;
        const nome = s.options[s.selectedIndex].getAttribute('data-nome');
        const preco = parseFloat(s.value);
        let m = mesas[mesaSelecionada];
        let item = m.itens.find(i => i.nome === nome);
        if (item) item.qtd++; else m.itens.push({ nome, preco, qtd: 1 });
        atualizarTelaCarrinho();
    }

    function atualizarTelaCarrinho() {
        const corpo = document.querySelector('#tabela-itens tbody');
        corpo.innerHTML = ""; let total = 0;
        if(mesaSelecionada) {
            mesas[mesaSelecionada].itens.forEach(i => {
                let sub = i.preco * i.qtd; total += sub;
                corpo.innerHTML += `<tr><td>${i.qtd}x</td><td>${i.nome}</td><td>R$ ${sub.toFixed(2)}</td></tr>`;
            });
            mesas[mesaSelecionada].total = total;
            let totalPago = mesas[mesaSelecionada].pagos.reduce((acc, p) => acc + p.valor, 0);
            mesas[mesaSelecionada].falta = total - totalPago;
        }
        document.getElementById('display-total').innerText = "TOTAL: R$ " + total.toFixed(2);
    }

    function abrirModal() {
        if (!mesaSelecionada || mesas[mesaSelecionada].itens.length === 0) return;
        document.getElementById('modal-pagamento').style.display = 'flex';
        document.getElementById('nome-cliente-modal').innerText = "CLIENTE: " + mesas[mesaSelecionada].cliente;
        atualizarModal();
    }

    function fecharModal() { document.getElementById('modal-pagamento').style.display = 'none'; }

    function atualizarModal() {
        let m = mesas[mesaSelecionada];
        document.getElementById('falta-modal').innerText = "FALTA: R$ " + m.falta.toFixed(2);
        document.getElementById('lista-pagos').innerHTML = m.pagos.map(p => `<div>✅ ${p.tipo}: R$ ${p.valor.toFixed(2)}</div>`).join('');
        
        if (m.falta <= 0.01) {
            document.getElementById('area-abatimento').style.display = 'none';
            document.getElementById('btn-whats-final').style.display = 'block';
        } else {
            document.getElementById('area-abatimento').style.display = 'block';
            document.getElementById('btn-whats-final').style.display = 'none';
        }
    }

    function registrarAbatimento(tipo) {
        let input = document.getElementById('valor-abatimento');
        let v = parseFloat(input.value);
        if (!v || v <= 0) return;
        let m = mesas[mesaSelecionada];
        let label = tipo === 'PENDURA' ? `PENDURA (${m.cliente})` : tipo;
        m.pagos.push({ tipo: label, valor: v });
        m.falta -= v;
        input.value = "";
        atualizarModal();
    }

    function finalizarComWhatsApp() {
        let m = mesas[mesaSelecionada];
        let fone = m.fone.replace(/\D/g, '');
        
        // 1. WhatsApp (Sempre tenta abrir primeiro)
        if (fone) {
            let msg = `*--- BOTECO 934 ---*%0A*CLIENTE:* ${m.cliente}%0A%0A*ITENS:*%0A`;
            m.itens.forEach(i => { msg += `• ${i.qtd}x ${i.nome} - R$ ${(i.qtd*i.preco).toFixed(2)}%0A`; });
            msg += `%0A*TOTAL: R$ ${m.total.toFixed(2)}*%0A*PAGAMENTOS:*%0A`;
            m.pagos.forEach(p => { msg += `- ${p.tipo}: R$ ${p.valor.toFixed(2)}%0A`; });
            window.open(`https://api.whatsapp.com/send?phone=55${fone}&text=${msg}`, '_blank');
        }

        // 2. Impressão
        const win = window.open('', '', 'width=350,height=600');
        let itensTxt = m.itens.map(i => `<tr><td>${i.qtd}x</td><td>${i.nome}</td><td align="right">R$ ${(i.qtd*i.preco).toFixed(2)}</td></tr>`).join('');
        let pagosTxt = m.pagos.map(p => `${p.tipo}: R$ ${p.valor.toFixed(2)}<br>`).join('');
        win.document.write(`<html><body style="font-family:monospace;width:280px;padding:10px;"><center><strong>BOTECO 934</strong><br>${new Date().toLocaleString()}<br>---</center><table width="100%">${itensTxt}</table>---<br>TOTAL: R$ ${m.total.toFixed(2)}<br>${pagosTxt}<br><center>CLIENTE: ${m.cliente}</center></body></html>`);
        win.document.close(); win.print(); win.close();

        // 3. Finaliza Sistema
        mesas[mesaSelecionada] = { aberta: false, cliente: "", fone: "", itens: [], total: 0, pagos: [], falta: 0 };
        mesaSelecionada = null;
        fecharModal(); gerarMesas(); atualizarTelaCarrinho();
        document.getElementById('whatsapp-cliente').value = "";
    }

    function filtrarProdutos() {
        const b = document.getElementById('busca-prod').value.toUpperCase();
        const s = document.getElementById('select-produtos'); s.innerHTML = "";
        produtos.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(p => {
            if(p.nome.includes(b)) {
                let o = document.createElement('option'); o.text = `${p.nome} - R$ ${p.preco.toFixed(2)}`; o.value = p.preco; o.setAttribute('data-nome', p.nome); s.add(o);
            }
        });
    }

    function filtrarClientes() {
        const b = document.getElementById('busca-cli').value.toUpperCase();
        const s = document.getElementById('select-clientes'); s.innerHTML = "";
        clientes.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(c => {
            if(c.nome.includes(b)) {
                let o = document.createElement('option'); o.text = c.nome; o.value = c.nome; o.setAttribute('data-fone', c.fone); s.add(o);
            }
        });
    }
    window.onload = iniciar;
</script>
</body>
</html>
