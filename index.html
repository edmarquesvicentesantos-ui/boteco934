<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ELITE V24 - BOTECO 934</title>
    <style>
        :root { 
            --dark: #1a252f; --sidebar: #2c3e50; --accent: #f39c12; 
            --success: #27ae60; --danger: #c0392b; --info: #2980b9; 
            --bg: #f1f2f6;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        aside { width: 250px; background: var(--dark); color: white; display: flex; flex-direction: column; flex-shrink: 0; border-right: 5px solid var(--accent); }
        .header-loja { padding: 25px; text-align: center; font-size: 20px; font-weight: bold; color: var(--accent); border-bottom: 2px solid var(--sidebar); }
        .menu-btn { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #34495e; font-weight: bold; transition: 0.3s; }
        .menu-btn.active { background: var(--sidebar); color: var(--accent); border-left: 8px solid var(--accent); }

        main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .conteudo { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .painel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }

        .grid-calc { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; }
        
        .res-card { background: #1e272e; color: white; padding: 20px; border-radius: 10px; height: 100%; border-left: 8px solid var(--accent); }
        .linha-res { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #3d4e5f; font-weight: bold; }
        .secao-titulo { color: var(--accent); margin-top: 15px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .destaque-valor { color: #2ecc71; font-size: 1.4em; }
        .btn-tipo { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 15px; width: 48%; }
    </style>
</head>

<aside>
    <div class="header-loja">BOTECO 934</div>
    <div class="menu-btn active">🧠 MIX & DOSES</div>
    <div class="menu-btn" onclick="ver('aba-vendas', this)">🛒 VENDAS</div>
    <div class="menu-btn" onclick="ver('aba-produtos', this)">📦 ESTOQUE</div>
    <div style="margin-top: auto; padding: 20px; text-align: center; color: #7f8c8d; font-size: 12px;">
        Elite V24 - Boteco 934
    </div>
</aside>

                <button id="btn-dose" class="btn-tipo" style="background:#ecf0f1; color:var(--dark);" onclick="mudarModo('dose')">DOSES (DESTILADOS)</button>
            </div>
