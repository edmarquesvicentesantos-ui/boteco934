<div class="painel">
    <h2>🚀 BIPAR PRODUTO</h2>
    <input type="text" id="barcode-input" placeholder="PASSE O LEITOR AQUI..." onkeypress="verificarBarcode(event)" style="background: #fff9c4; border: 2px solid #f1c40f;">
    
    <h2>📍 MAPA DE MESAS</h2>
    </div>

<script>
    // Agora os produtos podem ter um campo 'code'
    let prods = [
        {n:"CERVEJA LATA", p:6.00, code: "7891234567890"}, 
        {n:"CERVEJA 600ML", p:10.00, code: "7890001112223"}
    ];

    // Função que detecta o bip do leitor (Enter)
    function verificarBarcode(e) {
        if (e.key === 'Enter') {
            const barcode = document.getElementById('barcode-input').value;
            const produtoEncontrado = prods.find(p => p.code === barcode);

            if (produtoEncontrado && mSel) {
                mesas[mSel].itens.push({n: produtoEncontrado.n, p: produtoEncontrado.p});
                atualizaCarrinho();
                document.getElementById('barcode-input').value = ""; // Limpa para o próximo bip
            } else if (!mSel) {
                alert("SELECIONE UMA MESA PRIMEIRO!");
                document.getElementById('barcode-input').value = "";
            } else {
                alert("PRODUTO NÃO CADASTRADO COM ESTE CÓDIGO!");
                document.getElementById('barcode-input').value = "";
            }
        }
    }

    // Na aba de Cadastros, adicione o campo para o código:
    function salvaProd() {
        let n = document.getElementById('cad-p-nome').value.toUpperCase();
        let p = parseFloat(document.getElementById('cad-p-preco').value);
        let c = document.getElementById('cad-p-code').value; // Campo novo de código
        if(n && p) { 
            prods.push({n, p, code: c}); 
            alert("Salvo!"); 
        }
    }
</script>
